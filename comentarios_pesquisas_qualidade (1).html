rido","inscritos":1350,"confirmados":663,"aval":227,"taxa":0.3424,"nota":9.1189,"nps":73},{"id":26889,"data":46161,"curso":"Riscos ao fabricante farmacêutico na interface indireta com o consumidor: fraudes, publicidade enganosa e reparação.","area":"Mercado e Assuntos Jurídicos","mod":"Online","inscritos":260,"confirmados":135,"aval":63,"taxa":0.4667,"nota":9.6508,"nps":90},{"id":27658,"data":46162,"curso":"Os erros invisíveis na gestão da NR-01: como adequar sua empresa aos riscos psicossociais","area":"Mercado e Assuntos Jurídicos","mod":"Online","inscritos":270,"confirmados":137,"aval":69,"taxa":0.5036,"nota":9.5072,"nps":87},{"id":27116,"data":46156,"curso":"Tributação Corporativa da Indústria Farmacêutica - IRPJ e CSLL","area":"Mercado e Assuntos Jurídicos","mod":"Online","inscritos":32,"confirmados":32,"aval":22,"taxa":0.6875,"nota":7.7727,"nps":18},{"id":26875,"data":46163,"curso":"Liderança Versátil e Evolutiva","area":"Sindical Trabalhista","mod":"Presencial","inscritos":21,"confirmados":19,"aval":11,"taxa":0.5789,"nota":9.7273,"nps":100},{"id":27698,"data":46168,"curso":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","area":"Assuntos Técnicos-Regulatórios","mod":"Hibrido","inscritos":1025,"confirmados":741,"aval":382,"taxa":0.5155,"nota":9.4948,"nps":86},{"id":27721,"data":46168,"curso":"Operador Econômico Autorizado (OEA) e Auditorias","area":"Assuntos Técnicos-Regulatórios","mod":"Hibrido","inscritos":312,"confirmados":207,"aval":101,"taxa":0.4879,"nota":9.5644,"nps":88},{"id":27620,"data":46169,"curso":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","area":"Assuntos Técnicos-Regulatórios","mod":"Hibrido","inscritos":1155,"confirmados":799,"aval":391,"taxa":0.4894,"nota":8.8619,"nps":60},{"id":26890,"data":46175,"curso":"Gestão de Contencioso: como a cultura de dados e inovação podem contribuir para os resultados","area":"Mercado e Assuntos Jurídicos","mod":"Online","inscritos":117,"confirmados":58,"aval":24,"taxa":0.4138,"nota":9.7083,"nps":96},{"id":26986,"data":46189,"curso":"Fórum Expectativas 2027","area":"Inteligência de Mercado","mod":"Presencial","inscritos":202,"confirmados":121,"aval":56,"taxa":0.4628,"nota":9.4107,"nps":82},{"id":27647,"data":46184,"curso":"Pesquisa Clínica no Brasil: Inovação, Ética e Desafios da Legislação Atual","area":"Assuntos Técnicos-Regulatórios","mod":"Presencial","inscritos":237,"confirmados":102,"aval":54,"taxa":0.5294,"nota":9.5,"nps":87}],"comentarios":{"26273":["Agradeço o setor de comunicação, foi ótimo os lembretes dos intervalos. Parabéns a todos envolvidos.","Muito bom!!!","Sem comentários","Excelente dia, apresentações muito esclarecedoras.","Um evento de extrema necessidade para quem participa e não se conforma com o atraso dos processos que deveriam impulsionar a melhoria da saúde pública e privada em nosso país. O tema “Cuidado Assistencial em Rede: Desafios e Perspectivas para o Brasil” foi conduzido por excelentes palestrantes e reforçou algo que já sabemos, mas ainda não vivemos plenamente: precisamos de um cuidado verdadeiramente humanizado, pensado de forma holística e centrado no paciente.  Ainda não contamos com um sistema de atenção à saúde com prontuários integrados, o que fragmenta o cuidado e impede que o paciente seja, de fato, o centro da atenção. Para marcar uma simples consulta, o cidadão enfrenta inúmeros protocolos que, muitas vezes, não servem nem para fins estatísticos e tampouco aproximam o paciente dos serviços necessários para completar seus tratamentos.  Vivemos em um país que já dispõe de equipamentos modernos, exames de alta precisão e medicamentos eficazes — inclusive para doenças crônicas e de alta complexidade. Produzimos vacinas, temos iniciativas como a farmácia popular, e mesmo assim a jornada do paciente continua repleta de obstáculos. A centralização dos cuidados e as dificuldades de deslocamento (a logística, especialmente para quem vive longe dos grandes centros) tornam o acesso desigual e cansativo. A hospitalização em domicílio, que poderia ser uma alternativa mais humana e eficiente em muitos casos, ainda engatinha.  E por que, mesmo com tantos recursos, ainda não conseguimos garantir que as pessoas façam prevenção e concluam seus tratamentos? A atenção primária, que deveria ser a porta de entrada e o eixo estruturante do sistema, ainda falha em alcançar crianças, idosos e populações vulneráveis com a agilidade e a proximidade necessárias para resolver problemas simples antes que se tornem graves.  Há muito mais a ser dito, mas encerro com a metáfora brilhante usada pela Dra. Kelly Rodrigues: “O paciente entra em um lago para atravessá-lo a nado. O médico sabe onde é mais raso e mais fundo; o paciente não.”  E é justamente por isso que precisamos de uma rede de cuidado que guie, acolha e acompanhe — de forma humana, integrada e contínua — cada pessoa que entra nesse lago."],"26628":["Foi ótimo","excelente curso","Percebi que o palestrante é muito experiente no trabalho, mas inseguro para dar aula, carece de mais experiência com as aulas. Importante o SINDUSFARMA continuar promovendo as oportunidades.","No segundo dia tivemos uma hora a menos de evento e o Palestrante parecia estar 'com pressa' para o término e só abriu sua câmera no fim da palestra - totalmente diferente do 1o. dia que foi muito mais produtivo.","Conteúdo abrangente sobre a internacionalização, com exemplos importantes e informações relevantes de diversos mercados. João foi sempre muito disponível para tirar dúvidas e esclarecer qualquer ponto.","Palestrante muito técnico, com muito conhecimento, receptivo a todas as dúvidas. Equipe muito solícita e atenciosa no atendimento à problemas com a plataforma, ressalto a participação do Natan que foi essencial para um bom andamento do curso.","Achei interessante o tema, atual e muito relevante para os dias de hoje. Sou profissional de Farmacovigilância e trabalho ativamente com parcerias comerciais (license IN e OUT e processo de internacionalização). Embora não estava relacionado exatamente à minha operação, pude ter maior clareza da internacionalização e entender os mercados de países estratégios! Acredito que o tema poderia ter sido abordado em um dia apenas levando em consideração que o dia 05 terminou cedo!","Parabéns ao João Pedro pela apresentação e pelo Sindusfarma pela organização. O curso foi bastante amplo e com informações práticas da vivencia internacional!"],"26758":["Evento ótimo.","A formação da comunidade e formato proposto é bastante interessante, pois promove o debate, troca de ideias e estimula a participação. Aqui a discussão pode ser mais aprofundada  com profissionais que já atuam em acesso, porém estão inseridos em um cenário dinâmico e de diferentes culturas empresariais e   níveis distintos de maturidade  do trabalho de acesso ao mercado.","ótimo evento","parabéns pela palestra. Muito esclarecedora","Adorei a condução do evento, gostaria de mais oportunidades de participação online, são eventos que agregam muito valor.","Ótima iniciativa, Parabéns! Ansioso para receber o guia “A Função de Acesso e a Alta Performance na Nova Era do Valor em Saúde” apresentado durante o evento e demais frutos advindos da comunidade.","Excelente oportunidade de reunirmos profissionais que podem mudar o rumo do acesso no Brasil. Parabens pela iniciativa.","Excelente iniciativa. Parabéns aos idealizadores"],"26874":["Palestra realmente enriquecedora, saio diferente e com resultados rápidos devido a excelente oratória e condução da instrução em sala.","Acho que ficou confuso somente os horários do evento. Foi divulgado um horário e na prática foi outro. Na próxima poderiam realizar em dias consecutivos? Sou do Rio de Janeiro e facilita mais. Obrigada","A palestrante soube passar o conteúdo com muita responsabilidade, cuidado e técnicas. Fiquei satisfeita com a oportunidade.","O treinamento foi excelente. A troca foi enriquecedora","Evento excelente com uma estrutura ótima. A palestrante é excelente, domina o assunto e tem vivência prática o que enriquece muito mais o conhecimento teórico aplicado. Excelente.","Virginia é excelente! Além dos conhecimentos técnicos, ela tem didática e amplo repertório, que através dos exemplos trazidos realmente favorecem o aprendizado.  Adicionalmente, a organização da equipe do SINDUSFARMA foi impecavél. Deu vontade de fazer outros treinamentos na instituição.","O curso de liderança feminina superou minhas expectativas, especialmente pela qualidade da interação entre as participantes. As trocas de experiências e os debates em grupo foram um dos pontos mais valiosos da formação — ouvir diferentes perspectivas e contextos enriqueceu muito a reflexão sobre o meu próprio percurso e sobre os desafios comuns que enfrentamos como mulheres em ambientes corporativos. Outro aspecto que destaco é como o conteúdo dialogou com um trabalho de autoconhecimento que já venho desenvolvendo há algum tempo. Vários conceitos abordados retomaram temas que eu já havia explorado em processos terapêuticos, o que me permitiu revisitá-los sob uma nova lente — agora aplicada especificamente ao contexto da liderança e do desenvolvimento profissional. Essa conexão entre o pessoal e o profissional foi extremamente potente. Saio do curso também com uma lista de novos conceitos e ferramentas em que pretendo me aprofundar, tanto pela leitura de materiais complementares quanto pela aplicação prática no dia a dia. Recomendo a formação para outras mulheres em momentos de transição ou consolidação de carreira, e agradeço pela condução cuidadosa e pela construção de um espaço seguro para reflexão e troca.","O treinamento foi realmente transformador. A Virgina é maravilhosa!","Curso extraordinário. Relevante e contemporâneo."],"26875":["Excelente Treinamento, A Virginia é extremamente clara e objetivo!","Foi um diferencial participar desse evento, perfeito.","Curso excelente!  Atendeu bem as expectativas. A duração poderia ser maior para aprofundar mais o tema que é bastante amplo.","O curso foi muito inspirador","Foi muito gratificante participar deste evento. Virgina é fantástica!!","O curso foi excepcional, muito produtivo! A Virginia é muito didática, trouxe exercícios para conseguirmos aplicar a teoria na prática, que será útil no dia a dia.","otima palestrante, cheia de experiencia e historias relevantes.","O treinamento foi muito bom. O conteúdo é muito relevante."],"26877":["Excelente evento.","Horário do curso diferente da agenda de inscrição. Falhas de transmissão que duraram quase que o curso inteiro que dificultaram o entendimento do que estava sendo exposto e sem uma finalização. Foi proposta nova agenda quando já havia ultrapassado o horário de encerramento. Não costumo me queixar sobre possíveis essas adversidades, mas é complicado participar dos cursos sem uma previsibilidade de agenda, tendo a dificuldade de entendimento pela falta da transmissão adequada do evento e perceber que o tema não totalmente dissertado.","Excelente apresentação, pena que apresentou um problema de rede, com alguns cortes nas falas.","O conteúdo foi maravilhoso, mas as intercorrências de conexão complicam a concentração...","Bom treinamento, palestrante com bastante conhecimento do assunto.","Não deu tempo de falar sobre assédio. Internet do palestratante ruim (é importante ter um plano B para não prejudicar a palestra). O tema abordado da NR1 é importante, mas achei que faltou mais exemplos para ficar mais fácil o entendimento.","Muito bom!"],"26886":["Muito bom!","Excelente palestra! 👏 Muito clara, objetiva e com conteúdo de grande valor.","Excelente ! a palestrante possui um domínio amplo na área. Foi muito segura e precisa nas observações.","Ótimo centeúdo.","Tema super atual e complexo com impactos diretos nas empresas.","Excelente palestra, com tema atual e de grande interesse.","Excelente o treinamento.","Excelente conteúdo e forma didática de apresentação","Ótima apresentação."],"26889":["Palestrante bem preparada e demostrou domínio sobre o assunto. O evento só não foi melhor pois foi curto, mas mesmo assim, foi bem abrangente.","Muito bom, teve uma excelente abordagem, apesar de alguns pontos não terem sido apreciados, mas como o assunto é bastante extenso, atendeu bem.","Ótimo conteúdo. Obrigada !","muito bom.","Excelente","ótimo treinamento","Conteúdo incrível.","muito boa","Tema muito relevante e ótima palestrante, falou de forma clara e objetiva.","Ótimo evento.","Produtivo e esclarecedor."],"26890":["Conteúdo muito bem explorado e palestrantes bem preparadas. Apenas o tempo foi muito curto e as informações foram passadas de forma muito rápida, mas sem causar prejuízos ao conteúdo. Parabéns.","Ótima apresentação!","Abriu novas perspectivas com relação as possibilidades infinitas de levantamento e elaboração de dados estratégicos aos envolvidos. Excelente.","Ótimo conteúdo.","Apresentação bastante comercial, penso que poderia ter aberto mais possibilidades para formatos de gestão de dados gerados pelo contencioso","Curso muito esclarecedor, as palestrantes dominavam o tema e a exposição foi clara e objetiva, excelente para ampliação da visão acerca do contencioso e o uso de dados.","Excelente conteúdo"],"26900":["Curso muito bom, bem explicado, trazendo novas visões para quem tem e não tem experiência na áreas.","Curso excelente, extremante atual e enriquecedor, aplicável tanto para auditores mais experientes como para quem esta iniciando essa atividade","Foi ótimo o curso. Achei bem completo, bem estruturado e com um modelo que transita entre teoria e prática. Gostaria de sugerir outros temas como:  - Auditoria em Farmacovigilância e Parceiros comerciais - Gestão de Risco e Elaboração de CAPA.","O treinamento foi perfeito e muito bem conduzido!","O escopo do curso não deixava claro que era tão focado em BPF, sugiro trazer essa informação em próximos, pois o 3º dia foi muito especifico. O primeiro e segundo dia foram ótimos e trouxeram visão mais abrangente, possibilitando ampliar o conhecimento à outras áreas.   O palestrante foi excelente!   Sugiro ainda um curso específico para formação de auditores em FMV, pois além de recebimento da ANVISA pelas empresas, recebemos e auditamos parceiros.","Curso excelente, muito completo","O Danilo detém domínio sobre o assunto. Como minha atuação não é fabril, senti falta de alguns tópicos relacionados a temas não necessariamente fabris, foi ótimo ver exemplos de como a \"fábrica\" funciona, mas nas atividades algumas eram apenas temas de fábrica, acredito que poderia abordar alguns \"descumprimentos\" de outras RDCs que seriam mais no \"âmbito\" administrativo.  Sugiro ter alguma parte do curso demonstrando exemplo de construção de análise de risco e como avaliá-la, ou ter algum curso a parte sobre como elaborador análise de risco (contexto processual fábrica e alguma outra RDC \"administrativa\", cito por exemplo; RDC 735/22), como avaliar a análise de risco. Citaria principais documentos solicitados em auditoria, de forma geral. Sugiro também aprofundar mais a análise e tomada de decisão conforme o POP da ANVISA que trata sobre NC. No geral, gostei bastante do curso, o Danilo é ótimo, calmo e claro.","Quanto ao palestrante Danilo Cóstola, só tenho agradecimento por todo o conhecimento transmitido com clareza, calma e muito domínio do tema apresentado. Quanto ao evento como um todo, foi muito bem organizado e com um local adequado, porém eu poderia pontuar melhorias para que a nota fosse máxima: Título: Formação de Auditores: Do Conceito à Execução: acredito que quem busca por esse título, possa esperar um curso com conceitos para formação de auditores em geral, como da ISO 19011 ou até mesmo de outras Normas/Legislações. Apesar de sabermos do foco para a indústria farmacêutica, poderia deixar mais claro que seria \"Auditoria em BPF\", pois existe uma gama de outras Normas afins, mesmo na indústria farmacêutica; Horário: Três dias de evento foram adequados para o curso, porém o horário de saída às 18h ficou bem cansativo, para a quantidade de conteúdo do dia e pelo trânsito de São Paulo, principalmente para quem veio de fora, para se alimentar e voltar para o hotel depois mais tarde. Material de apoio: O curso tem um custo razoável e senti falta de material de apoio distribuído antes do curso. Um drive com as Normas, material teórico e apresentações facilitaria o entendimento e acompanhamento do conteúdo extenso. Ao final do dia seria possível avaliar o que foi ministrado e voltar com dúvidas para o dia seguinte. Sem material, isso ficou prejudicado. Poderia ser avisado da necessidade de levar laptop/ipad ou semelhante, pois na falta de um material disponível, quem tinha um computador teve um diferencial importante para os exercícios. Obrigada e até a próxima!","Conteúdo completo, mas poderia aprofundar mais em alguns temas tecnicos de maior relevancia no cenario regulatorio atual como Integridade de Dados e Controle de Contaminação. Com relação ao tempo, o horario de finalização poderia ser mais cedo para evitar transito intenso em SP.","O treinamento foi bastante completo a altamente aplicável às atividades de BPF na indústria. Sugiro que entre para o Programa um curso focado em Formação de Auditores em Farmacovigilância e também em Auditorias de Sistemas de Farmacovigilância (RDC 406/2020 e guias internacionais).","O instrutor demonstrou domínio técnico e didática para transmitir o conhecimento de maneira clara. Apesar da diversidade de experiência do público participante, foram apresentadas informações relevantes e tivemos discussões enriquecedoras.","Sugiro que treinamentos com a carga horária extensa sejam divididos em mais dias. Sugiro também a realização de curso focado em auditorias de farmacovigilância.","O treinamento/curso é excelente e o Danilo passou o assunto com muita clareza, conseguiu sanar muitas dúvidas e ainda nos direcionou para realizar uma auditoria direta e objetiva. O tempo para o curso é excelente ssão com as perguntas formuladas durante a apresentação!","O webinar sobre fitoterápicos, apresentado por Michel, foi muito informativo e bem estruturado. O conteúdo foi claro, relevante e alinhado às exigências regulatórias atuais, trazendo insights importantes sobre o novo marco. Michel demonstrou domínio do tema e conduziu a apresentação de forma didática e envolvente. Como sugestão, seria muito interessante a realização de um novo webinar para aprofundamento do tema, considerando a grande quantidade de informações apresentadas e a relevância do assunto para a área regulatória.  De forma geral, o webinar foi excelente e muito enriquecedor para o desenvolvimento profissional na área regulatória.","Ótima apresentação.","Ótimo!!","Tema complexo onde o palestrante apresentou domínio e clareza nas informações.","Achei que o treinamento poderia ter sido divido em dois dias, era muito conteúdo e foi passado com muita velocidade. Para eu que estava entendendo o novo processo, tive dificuldades para acompanhar. Por outro lado, colegas que já estavam mais familiarizados com a nova RDC, aproveitaram melhor o treinamento.","excelente e bastante didático. Muito valido.","Excelente apresentação!","O evento foi muito construtivo. O Michel entende bastante do assunto e a palestra dele é fluida, fácil de assimilar e não é cansativa.","Pelo tamanho do conteúdo, infelizmente foi pouco tempo, mas muito rico de informações e palestrante com muito conhecimento.","Foi muito esclarecedor.","Excelente","Palestrante com muito conhecimento sobre o assunto e conseguiu compartilhar com os participantes","Ótimo poder de síntese do palestrante e bastante didático. Sugestão: tema complexo que poderia ser dividido em várias partes para aprofundamento dos conceitos e apresentação de cases para discussão.","ótima palestra","Excelente apresentação","Excelente","Muito esclarecedor.","Foi ótimo","Muito bem organizado. Informações claras e precisas.","Foi um curso excelente, porém devido a complexidade do tema seria interessante mais tempo para perguntas e discussão.","O webinar foi bastante enriquecedor e abrangente; entretanto, o tema é demasiadamente amplo para ser explorado em um período tão breve. Ainda assim, contribuiu significativamente para proporcionar uma visão mais ampla e aprofundada sobre o assunto.","Excelente","O palestrante sintetizou muito bem os principais aspectos do novo marco explanando com clareza, segurança e objetividade. Parabéns ao palestrante e ao Sindusfarma!","Muito interessante a palestra! Michel apresentou muito bem o que mudou com a nova norma. Gostei bastante, obrigada.","Excelente abordagem e apresentação do Michel no tema. Foco nas alterações das normativas.","O treinamento foi muito bom,o ministrante tem muito conhecimento.","material e apresentação muito clara","Palestrante muito didático e simpático. Tema relevante.","Palestra excelente, muito esclarecedora, trouxe muitos pontos importantes.","Tema relevante, bastante conteúdo, talvez fosse interessante dividir em duas sessões. Mas o evento foi ótimo.","O palestrante demonstrou possuir grande expertise sobre o assunto abordado, além de grande didática. Sugestão de aumentar o tempo da reunião.","Muito bom, seria interessante mais eventos deste tipo para detalhar aspectos da legislação.","Foi uma excelente apresentação","A forma como ele apresentou foi bastante didática.","Excelente Evento. Parabéns pela Atividade.","excelente e esclarecedor","Ótimo treinamento"],"27301":["Conteúdo bom pelo tempo determinado."],"27375":["Muito bom!","ótimo!","Webnar incrível.","Ótimo evento, cumprindo um papel importante de educação contínua dos profissionais do setor Farma em Inteligência Artificial.","Sugiro uma melhora no material apresentado, bem como a apresentação de cases, visto que seria mais didático.","Só achei pouco tempo para as perguntas!  Tinha vsrias interessantes no chat","Ótima apresentação.","Ótima troca de experiência e estimula a dar continuidade no aprendizado do tema.","Parabéns pelo evento! Organização, conteúdo, temas palestras e palestrantes excelentes.","gostaria que tivesse mais eventos como este.","Foi o primeiro evento Sindusfarma que participei em muito tempo. Achei que o evento demorou bastante para começar, talvez por estarem esperando o pessoal do presencial chegar, mas poderiam ter sinalizado o horário real de início das apresentações. A parte do Maurício foi muito interessante e me trouxe alguns insights muito bons. Quanto aos outros palestrantes, ou ficaram muito superficiais no tema, ou entraram em nichos específicos que não estava tão de acordo com as minhas expectativas. Apesar disso, passarei a seguir com mais frequência os cursos e webinares da Sindusfarma, pois são uma porta de grande valor à discussões e networking para a classe!","Excelente palestra, uma base muito eficaz para o entendimento de ia na indústria, valeu muito! Desejo que tenha mais em relação a este tema.","A palestra do Maurício Garcia poderia ter sido maior, ele foi excelente!!","Boa tarde a todos,  Time Sindusfarma, valeu a pena esperar e muito obrigado pela excelente palestra intitulada, \"IA na Indústria Farmacêutica: da Estratégia à Execução\".  Precisamos fomentar o letramento no assunto, pois o nosso segmento não pode ficar de fora!  Sou profissional de Tecnologia da Informação, estou estudando, pesquisando, usando e trabalhando fortemente com Inteligência Artificial, já estou na segunda fase, por exemplo, que consiste em criar produtos ou Sistemas com o uso da Inteligência Artificial e a todo o momento, aprendendo coisas novas, uma avalanche diária de Informações.  A IA, chegou para ficar, é a mais nova Revolução Tecnológica da atualidade!  Aproveitando, gostei muito da participação do Maurício Garcia, conteúdo excelente e principalmente pois me graduei e pós graduei na Adtalem e DeVry, sabe bem do que está falando.  Tragam mais palestras e conteúdos sobre o tema e muito obrigado.","Parabéns! Que iniciativas como essa continuem promovendo crescimento, troca de experiências e desenvolvimento contínuo.","Curso excelente.","Minha crítica tem relação ao atraso.","Muito bom o curso, gostaria do contato da empresa e do valor promocional que estavam cobrando para o curso","Excelente  abordagem sobre IA  Governança e Legislação.","Por mais eventos sobre IA aplicado ao setor regulado. É muito produto verificar as tendências envolvidas nesse tema.","A explicação de alguns conceitos para quem não é da área seria interessante.  Mas a abordagem e conteúdo foram excelentes!","Excelente apresentações com otima didática.","Excelente conteúdo.","Gostaria que tivesse sido mais direcionado para Industria farmaceutica.","Acreditava que iria ter mais conteúdo sobre o assunto.","Excelente iniciativa!! Parabéns!!","Adorei o evento mais achei o tempo do Maurício muito curto (pela mega experiência dele e pela importância das informações)","Achei ótimo o evento, mas esperava ver um pouco mais de estratégia e de execução na prática.","Obrigado pela oportunidade. Acredito que seria interessante novos encontros para apresentar mais detalhes sobre o assunto. Muitas duvidas não foram respondidas.","Parabenizo pelo tema pois é algo que precisamos realmente nos aprofundar.","é muito bom saber como a sindusfarma tem incentivado e motivado o aprendizado de IA e apresentar dados concretos baseados em evidências/pesquisa para expor às associadas, e trazer palestrantes capacitados e que não abordam o tema de forma superficial, falando \"mais do mesmo\".","É muito enriquecedor para nosso dia a dia, quando temos profissionais que compartilha seus conhecimentos com a didática e segurança no tema.  Gratidão Sindusfarma!","o evento foi muito bom","Parabenizar a Sindusfarma por proporcionar excelentes curso, contribuindo para um aprendizado contínuo.","Gostei muito de ter participado, espero poder esta sempre aprendendo mais sobre a profissão que escolhi amar.","eu achei o curso muito importante para os dias atuais, pois acredito que cada dia mais estamos automatizando os processos e a industria farmaceutica também.","Foi ótimo","Treinamento de alto nível com discussões de grande valor.","A abertura poderia ser menor, o evento foi divulgado com inicio as 08h30 e teve inicio as 09h40/10h00"],"27418":["Excelente!","O evento foi muito proveitoso, muitos esclarecimentos a respeito do assunto e os palestrantes maravilhosos.","Gostei muito dos palestrantes . Tirou varias duvidas.","Foi muito bom o aprendizado e as discussões.","aprofundar mais detalhes com Anvisa","Evento excelente! Recomendo realizar uma nova rodada com a participação da GGMED da ANVISA","Excelente apresentação, foi ótimo a apresentação explicativa no inicio.","Fórum muito bom. Infelizmente na hora das perguntas, muita coisa ficou vaga por não ser \"de responsabilidade\" da gerência da Anvisa que estava participando. Nesses casos, em sabendo que seria um evento multidisciplinar, vamos dizer, o ideal seria contatar os possíveis responsáveis das áreas para que as dúvidas de todos os setores regulamentados fossem sanadas.","Excelente Fórum. Discussões bastante produtivas.","Trazer para a mesa de discussão profissionais da ANVISA da área de produto.","Precisamos de eventos de nitrosaminas que a GESEF esteja presente","Excelente evento.","Gostei da abordagem desde o início do processo de avaliação regulatória do tema para contextualizar os acontecimentos e o passo a passo que levou a regulamentação ao estágio de maturidade atual.","O evento foi muito bom, ótimas palestras, com muito conhecimento técnico robusto, mas achei que pelo título Atualização técnico-regulatória, senti falta de informações mais detalhada sobre a visão da Anvisa. Das perguntas que foram realizadas para a palestrante da Anvisa a resposta foi que ela não tinha conhecimento, então talvez fosse interessante num próximo evento trazer mais pessoas da Anvisa para tentar traçar um panorama mais amplo sobre como a Anvisa vai tratar a questão das análises de risco, etc.","Acho que dentro do escopo desse encontro, só ficou faltando um tempo extra para perguntas.","Esse tipo de evento é muito importante e a iniciativa para realização é ótima! Por favor, organizem mais eventos como esse","Excelente conteúdo, abordado de forma muito clara e objetiva! Parabéns a todos os envolvidos.","Excelente seminário com atualizações importantíssimas, tanto do Brasil quanto internacionais, a respeito de um dos temas de mais relevância e impacto na indústria farmacêutica na atualidade.","Excelente evento. Poderia ser com maior carga horária","Muito interessante o evento, sempre muito bom conhecer o olhar do setor controlado e o setor de controle.","O forum foi uma ótima oportunidade para avaliar como o mercado está se comportando e visão futura, principalmente por parte dos órgãos reguladores.","O evento foi bom, no entanto teria sido mais completo se tivesse algum especialista da GESEF-ANVISA.","Muito bom","Ótimo workshop, muito esclarecedor!","Excelente programação, com temas altamente relevantes e de grande importância para o desenvolvimento e aprimoramento profissional.","Evento muito esclarecedor para todos os níveis de entendimento do assunto.","O curso foi ótimo, porém na transmissão on-line o som estava muito baixo.","Muito bom este fórum para se atualizar este tema. Foi muito interessante e agregou conhecimentos.","O evento foi sensacional, uma pena ter durado apenas 4 horas. Saí do evento extremamente satisfeito com diversos conceitos valiosos para compartilhamento com minha equipe. Além disso, tive a oportunidade de rever colegas de outrora e fazer novas amizades. O evento foi 10/10.","Muito bom","Ótimo evento!","Foi bom, mas poderia ter aprofundamento analítico maior","Evento com excelente conteúdo técnico","Falar sobre esse tema, é de extrema importância, principalmente quando os ministrantes tem expertise no assunto e uma excelente didática! Obrigada Sindusfarma e aos mestres!","Excelente iniciativa!","Excelente","O evento proporcionou a visão do assunto em diferentes cenários, trazendo especialistas no tema abordado. Dessa forma foi possível fortalecer a importância do intercâmbio de informações, para que de maneira integrada se possa alcançar as melhores soluções.","Excelentes palestras e discussões enriquecedoras.","Gostei do evento e das palestras","Naiffer foi o unico que trouxe uma perspectiva atual e colaborativa para os participantes. A fala da Carolina como representante da Anvisa, apesar de tímida em termos de conteúdo e posicionamento, é sempre importante ouvir a Anvisa. Carolina se ateve apenas a dizer sobre IFA e se posicionou em não contribuir com algum racional ou visão sobre produto acabado, assim ter algum servidor da Anvisa que possa trazer uma visão regulatória mais holistica e global seria muito positivo. Entendo a participação do setor regulado é crucial para discussão, mas poderia trazer cases de sucesso e dores reais da rotina. Mesa redonda mais preparada com perguntas direcionadas para as areas dos participantes da mesa para melhor aproveitamento do conhecimento dos convidados. O evento é importante para o atual cenário mas deve ser mais comprometido com o ensino-aprendizagem como foi a excelente postura e apresentação do Naiffer."],"27424":["Excepcional ação abordar esse tema.","A palestra foi de extrema valia e um ótimo conhecimento diante dos nossos desafios diários dentro da empresa.","Conteúdo maravilhoso, muito bom!","Parabéns !!!","As palestrantes demonstraram segurança e didática ao abordar o conteúdo.","Conteúdo esclarecedor e prático."],"27437":["Curso muito rico em conteúdo. Parabéns aos palestrantes, excelente didática e abordagem. Foi uma experiência maravilhosa e muito agregadora.","A segunda palestrante parecia que estava mais preocupada em exaltar o próprio currículo a demonstrar conteúdo relevante. O último dia de evento foi bastante redundante."],"27620":["Evento maravilhoso.","excelente.","Excelente encontro, discussões relevantes e atuais.","Conteúdo do curso de extrema relevância, mas a velocidade que foi conduzido o curso poderia ter sido um pouco mais ágil.","Muito bom treinamento.","Excelente treinamento e palestratntes","Evento com muitas informações e esclarecedor.","Palestra muito interessante, com material completo. As dúvidas da plateia e online foram muito interessantes e abriram para uma troca rica no evento.","O evento foi bem organizado, mesclando presencial e online e o sistema funciona muito bem.  A palestra tinha um material bem organizado, mas senti que a palestrante as vezes perdia o foco, demorava em algumas questões mas deixava de dar enfoque em outras importantes. No geral foi de grande benefício ouvir questões de pessoas com experiência em submissões com a ANVISA e discutir pontos polêmicos. Faria novamente!","curso excelente e esclarecedor!","A palestrante tem muito conhecimento e o material apresentado foi muito bom, entretanto em alguns momentos o curso foi para um outro lado , mais de chorar as dores","O conteúdo poderia ter sido um pouco mais aprofundado, principalmente o REQ.","A palestra apresentou excelente qualidade, abordando o tema de forma clara, objetiva e muito bem estruturada. A palestrante demonstrou domínio do conteúdo, transmitindo conhecimento de maneira didática, o que facilitou a compreensão.","Muito bacana a troca de conhecimentos.","O treinamento foi incrível, e a Denise é excelente. A única ressalva que tenho a fazer é em relação ao áudio, que estava bastante baixo para quem participou online, o que dificultou, em alguns momentos, a compreensão do que estava sendo falado.","Discussão superficial do tema. O REQ limitou-se à leitura dos itens, sem aprofundar a análise sob a perspectiva avaliativa da ANVISA.","Curso ótimo com muitas informações novas e conteúdos interessantes. Muito bom","A didática da apresentação pode ser aprimorada, especialmente em relação à clareza, organização e fluidez. Em alguns momentos, a condução ficou um pouco confusa, o que dificultou o acompanhamento e reduziu o engajamento.","Evento de grande proveito para o meu aprimoramento profissional e ampliação de conhecimentos. Palestrante excepcional, com amplo domínio dos temas abordados e uma didática clara e envolvente","Apesar de ter achado o evento excelente como um todo, acredito que o assunto de maior interesse teve pouco destaque, que era a questão do REQ.","ÓTIMO EVENTO, PALESTRANTE COM MUITO CONHECIMENTO.","O conhecimento da Denice é, sem dúvida, um grande diferencial do curso, especialmente considerando sua ampla experiência na indústria farmacêutica. A forma como ela compartilha vivências e informações práticas agrega bastante valor ao conteúdo apresentado. No entanto, acredito que a parte prática do curso poderia ter sido mais aprofundada. Em alguns momentos, dúvidas levantadas pelos participantes acabavam ficando sem respostas mais objetivas, ou retornavam como uma reflexão, o que deixou a sensação de falta de direcionamento em determinados temas. Minha expectativa era compreender de forma mais detalhada as solicitações da ANVISA através do REQ, explorando exemplos práticos e interpretações mais aplicáveis ao dia a dia. Porém, o conteúdo acabou sendo apresentado de maneira mais introdutória e geral. De forma geral, o curso possui um conteúdo relevante e uma profissional muito experiente conduzindo as aulas, mas acredito que um maior aprofundamento prático tornaria a experiência ainda mais completa e enriquecedora. Muito obrigada!","O curso foi ótimo. Muitas abordagens e trocas significativas.","O evento foi ótimo, consegui obter muitos ensinamentos.","Ao considerar o nome do evento, a agenda disponibilizada e os acontecimentos mais recentes na Anvisa, a expectativa era de que fossem abordados tópicos relacionados ao REQ como instruções de preenchimento, dicas, experiências de outras empresas (considerando que a palestrante possui uma consultoria), e não foi isso que foi apresentado. No primeiro dia, foram abordados temas muito básicos para quem já é da área (e que está envolvido com o preenchimento do REQ) e no segundo dia, não tiveram informações diferentes da que o setor regulado já possuía em relação ao documento.","Avaliar o som para quem participa de forma online, visando melhor aproveitamento do treinamento.","Foi excelente! A Denise é maravilhosa!","Devido ao tema poderia ter sido mais voltado a nova legislação de análise otimizada em sim, destrinchando os principais pontos, quais as expectativas, pontos levantados pela Anvisa e as Empresas. Como elaborar a documentação da melhor forma para a Análise Otimizada.","Muito bom!","Acho que poderia ter focado mais nas REQs, mesmo sendo um assunto sem expertise por ser novidade para todos, citando cases, abrindo para discussão, porque o tema de MRQ foi um pouco repetitivo para quem já está inserido em processos mais robustos de AR (mesmo para mim, que sou de documentação técnica analítica de PA).","A proposta de relatar e entender a analise otimizada (REQ) foi muito fraca, não havendo aprofundamento nos itens e detalhamento do que se espera, além de não enfatizar pontos críticos. Infelizmente, algum impasse ocorreu com a palestrante fazendo com que encurtasse a apresentação, ademais no tema mais importante.","Evento sensacional e ótima explicação da palestrante Denise","Achei que o conteúdo planejado era muito interessante mas senti falta de exemplos práticos e mais atuais sobre as regulamentações cenário regulatório brasileiro.","Tínhamos grande expectativa em relação ao evento, especialmente por se tratar da nova era do REQ. O evento foi dividido em dois dias. Entretanto, no primeiro dia (27/05), foi apresentada apenas uma visão básica sobre assuntos regulatórios voltados à análise do dossiê do produto, deixando o tema REQ para ser discutido em apenas meio período do segundo dia (28/05).  A palestrante Denise, que possui reconhecimento na área regulatória farmacêutica, demonstrou pouco domínio sobre o assunto REQ, não trazendo orientações práticas, dicas relevantes ou contribuições adicionais baseadas em sua experiência na ANVISA para auxiliar no entendimento do documento. Além disso, sua postura durante o evento foi pouco profissional para uma palestrante. Houve imposição para que não fosse realizado intervalo no período da tarde do dia 27/05, proibição da gravação da palestra, além de declarações se eximindo de responsabilidade sobre o conteúdo apresentado. Também houve ausência da palestrante durante parte do período da tarde de hoje, justamente no momento em que o tema REQ seria abordado. Diante disso, causa estranheza que a palestrante seja apresentada como referência em assuntos regulatórios relacionados à ANVISA, especialmente considerando sua experiência prévia no órgão, mas sem transmitir conhecimentos práticos ou diferenciais esperados para esse tipo de evento.  De forma geral, o evento não atendeu às expectativas propostas. Não foram apresentados conteúdos novos ou aprofundados, não houve auxílio efetivo para o preenchimento do REQ e tampouco foi compartilhada a visão prática da ANVISA que havia sido sugerida na divulgação do curso.","Foi excelente!","A palestrante tratou o tema com casos reais, facilitando assim a compreensão do tema, além de condução da palestra de uma forma tranquila, mas de modo que não fosse cansativa. O compartilhamento dos pontos relacionados ao REQ foram os que mais contribuíram para o momento da companhia em qual atual, corroborando com o mesmo cenário e dificuldades discutidas.","Positivo pelo compartilhamento e visão dos colaboradores de empresas diferentes. Entendo que o REQ é um tema muito recente para todos, mas senti falta de mais conteúdo referente à própria temática.","Evento rico com muita oportunidade de avaliação / re-avaliação de processos e referências. Ecoou muito positivamente.","Achei o tema muito interessante e atual, algo que vamos precisar aplicar na nossa rotina. A abordagem inicial foi boa e trouxe uma visão geral interessante do assunto. Porém, quando chegou no foco da REQ, senti que o tema foi tratado de forma muito rápida e superficial. Nesse ponto, a discussão acabou sendo mais complementada por quem já tem experiência na rotina do que pela própria palestrante. Acredito que a palestrante tenha bastante experiência no tema, mas a condução do curso, em alguns momentos, foi um pouco confusa e desorganizada. Houve várias falas fora do foco, o que acabou gerando dispersão e possível perda de interesse. Para alguns, sendo um curso pago, ainda mais considerando que não é barato, a experiência provavelmente foi mais frustrante.","A abordagem do conteúdo permaneceu na superfície e não entregou as perspectivas que buscava.","A palestra abordou um tema extremamente relevante, especialmente diante das mudanças recentes envolvendo o REQ e a automatização dos processos na Anvisa. No entanto, a condução do conteúdo poderia ter sido mais estruturada e aprofundada, principalmente na parte central da proposta.  Na seção destinada ao REQ, esperava-se uma explicação mais clara sobre conceitos, aplicabilidade prática e direcionamentos técnicos. Contudo, o enfoque acabou sendo mais voltado às dificuldades e à complexidade do processo, sem o mesmo nível de detalhamento sobre como superá-las no contexto regulatório.  Além disso, a apresentação dedicou uma parcela do tempo à demonstração de uma ferramenta de otimização, o que acabou transmitindo a percepção de um viés comercial, desviando do objetivo principal da palestra.","Achei que a palestrante poderia trazer contribuições mais significativas, apresentando pontos críticos de fato do dossiê, exigências mais recebidas atualmente, etc. No primeiro dia achei bem superficial a apresentação e no segundo dia, onde poderiam haver mais contribuições sobre o REQ e demais itens da agenda, o curso foi finalizado em meio período apenas.","Foi espetacular participar, foi realmente uma troca de conhecimento e experiência muito boa.","sem comentários adicionais","Evento esclarecedor, uma vez que abordou os itens de registro e do REQ.","O evento foi muito interessante no aspecto da revisão da documentação de CMC, mas senti falta de exemplos mais voltados para o preenchimento do REQ em si.","Foi interessante os temas abordados, porém minha expectativa era ser focado REQ e da análise automatizada/otimizada.  Obrigada.","O primeiro dia do curso foi muito bom, mas deixou muito a desejar no segundo dia, tanto pelo tempo como pelo conteúdo que passou extremamente rápido. Como no meu caso foi um curso pago, realmente, não valeu a pena o valor.","Uso de normas desatualizadas, linha de raciocínio confusa, informações conflitantes com a legislação.","Excelente conteúdo, facilitador com excelente didática","é mto importante trazer pessoas que estão na interface direta entre expectativa da agencia e realidades das industrias.","Excelente conteúdo!","Excelente apresentação, muito esclarecedora.","ótimo assunto, acrescentou bastante mas ainda há muitas incertezas na atuação da Anvisa, muita dificuldade repassando para as prejuizo do trabalho atrasado, enfim...ainda restam duvidas..","O evento foi ótimo, e conseguiu, em pouco tempo trazer os principais pontos de atenção para a elaboração e montagem de dossiês de registro mais robustos. O material apresentado também será muito útil para consultas futuras. Também foi ótima a possibilidade de tirar dúvidas e compartilhar da experiência e conhecimento da palestrante e demais colegas","O título do curso era: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada. A parte do MRQ foi uma apresentação pouco aprofundada e que seria muito interessante para analistas juniores, que estão ingressando na área regulatória. Para quem já tem mais experiência e atua na área, faltou aprofundamento e o que todos estavam esperando era um olhar para o REQ. As correlações com o que é requerido, um novo olhar sobre o que REQ nos mostra que a Anvisa considera nas avaliações. E isso não aconteceu. Na única parte que entramos no REQ a palestrante só compartilhava suas opiniões pessoais e queria mais ouvir as experiências das outras pessoas. Por ser uma consultoria, passava a impressão que queria coletar informações para utilizar em sua rotina. Me deixou muito decepcionada, pois esperava mais do curso em vista de como o tema REQ está em alta atualmente.","Considerando o escopo do evento relacionado ao REQ, a discussão relacionado ao documento poderia ser mais extensa e aprofundada.","ótimo","O evento foi muito bom! O tema é bastante atual e ainda bem novo para todos e por isso, a troca de experiências foi muito importante. Gostei muito! Obrigada","Acho que faltou mais desenvolvimento e debate sobre O MRQ e a REQ. Talvez o tempo foi curto, mas senti falta de conteúdo técnico.","A Denise é excelente, sempre muito didática.","O problema do microfone muito baixo comprometeu o evento e a redução dos temas para o segundo dia.","Muitas informações","Ótimo evento, extremamente esclarecedor","Excelente evento, muito rico em detalhes, parabéns!","O treinamento foi muito bom, com uma programação interessante e bem estruturada. A instrutora demonstrou excelente didática, conduzindo o conteúdo de forma clara e acessível, o que contribuiu significativamente para o aproveitamento das atividades. Como ponto de melhoria, destaco que o segundo e último dia foi conduzido de forma bastante acelerada. A programação prevista para os períodos da manhã e da tarde acabou sendo concentrada apenas na manhã, o que resultou na exclusão de alguns temas relevantes, especialmente aqueles nos quais eu tinha maior interesse em me aprofundar. Compreendo que imprevistos podem ocorrer, porém, na prática, houve a perda de um turno do treinamento, impactando parcialmente a experiência. De forma geral, a experiência foi positiva, principalmente pela qualidade da condução e do conteúdo apresentado.","Gostaria de contribuir com um feedback construtivo sobre o curso. Embora a proposta fosse interessante, o conteúdo apresentado não atendeu totalmente às minhas expectativas. Tive a percepção de que o ritmo foi bastante acelerado, especialmente nas partes mais críticas, como EqFar e estabilidade, que foram abordadas de forma muito rápida. Por outro lado, a seção de REQ acabou sendo mais longa, porém sem uma estrutura clara de explicação ou aprofundamento. Houve predominantemente uma troca de experiências entre os participantes, o que, embora válido, não agregou de forma significativa ao meu desenvolvimento técnico. Eu esperava maior direcionamento por parte do instrutor, com apresentação de requisitos aplicáveis, exemplos práticos e, se possível, casos reais que ilustrassem melhor os pontos discutidos. Além disso, algumas das minhas dúvidas não foram plenamente esclarecidas, o que contribuiu para a sensação de aproveitamento limitado do curso. Acredito que ajustes no equilíbrio do tempo entre os tópicos e maior foco em conteúdo estruturado e aplicado poderiam enriquecer bastante a experiência.","A Denise é excelente, demonstra ter muita experiência e o principal, está disposta a compartilhar. O curso foi bem caro e o segundo dia ficou corrido. Imprevistos acontecem e super entendo ela ter que sair, mas penso que outra pessoa da Brainlike poderia ter assumido a apresentação na parte da tarde no lugar da Denise.","Excelente  apresentação.","Apesar da experiência ampla da paletrante , eu esperava que uma maior exploração sobre o assunto REQ.","O conteúdo foi bom, tinha muito embasamento e conhecimento da apresentadora, porém ela pareceu um pouco perdida com a sequência e conteúdo dos slides, bem como um pouco incomodada em responder algumas questões","Muito bom","Muito proveitoso, didático e valido.. Parabéns para a palestrante e obrigada Sindusfarma pela oportunidade","Parabéns pelo evento. foi bem proveitoso","Confuso em alguns tópicos , superficial.","Achei que poderia apronfundar mais no conteúdo, trazendo cases para trocas, já que o público é o setor regulado em sua maioria e experiente com a documentação necessária para submissão de um registro. Além disso, achei pouco tempo para explanação do REQ, tema bem importante e urgente ao momento.","A palestrante é ótima!","Excelente! Bem esclarecedor e necessário. Parabéns à palestrante!","EXCELENTE","O conteúdo não atendeu as expectativas. Esperava entender melhor a visão da Anvisa, mas o conteúdo neste ponto foi superficial. Com relação ao REQ, não houve esclarecimentos adicionais sobre as expectativas da Anvisa no preenchimento e como está sendo a avaliação da Anvisa da documentação.","Temas muito excelente e bem explicados.","Esperava que falasse mais detalhadamente sobre o preenchimento do REQ","Sempre é mto bao a parceiria da Sindusfarma com a Denise. Ela é uma profissional excelente.","Muito útil e conseguiu não ser tedioso, mas interessante do início ao fim!","Gostei bastante do evento e a Denise é uma otima profissional com um amplo conhecimento sobre o tema.","A principal questão é que o conteúdo apresentado não correspondeu ao título e à proposta divulgada. O curso prometia abordar especialmente o REQ, porém esse tema foi tratado de forma extremamente superficial. Em diversos momentos ficou evidente que a própria palestrante não dominava o assunto relacionado ao REQ, não trazendo exemplos práticos, experiência real ou aprofundamento técnico adequado. Além disso, a condução do curso passou a impressão de que havia um interesse maior em coletar informações das indústrias participantes ou em promover sua própria consultoria, do que efetivamente entregar conteúdo estruturado e relevante. Isso comprometeu a qualidade técnica e a objetividade esperada. Outro ponto crítico foi o desvio de foco. Houve uma abordagem sobre avaliação de dossiê, tema que não era o objetivo principal do curso conforme divulgado. Isso fez com que o tempo fosse mal aproveitado e que os participantes não obtivessem o conhecimento prometido, especialmente no que diz respeito ao REQ. De forma geral, o curso ficou aquém das expectativas, com falta de profundidade, desalinhamento com o tema proposto e pouca agregação prática para quem buscava atualização sobre os novos direcionamentos da Anvisa.","Denise é ótima. Clara e objetiva e sempre com respostas coerentes","O conteúdo do treinamento não atendeu às expectativas, uma vez que, durante a apresentação, foram fornecidas informações incorretas e/ou desatualizadas. Adicionalmente, não foram agregados novos conhecimentos nem promovidas discussões relevantes. No que se refere ao tema REQ, a abordagem foi superficial, sem que a palestrante demonstrasse domínio técnico adequado sobre o assunto, considerando as discussões já realizadas com a Anvisa.","O curso teve uma proposta interessante, porém, na minha percepção, não atendeu completamente às expectativas em relação ao tema apresentado. Senti falta de uma abordagem mais aprofundada e alinhada ao conteúdo prometido. Acredito que, com maior detalhamento e exemplos práticos, a experiência poderia ser mais completa.","O primeiro dia foi bem produtivo, o segundo por contra tempo fugiu do esperado, sugiro ter sempre um apresentador backup ou moderador para guiar no tempo e mesmo da suporte ao palestrante oficial.","Agenda do segundo dia foi reduzida.","Evento encerrado de forma antecipada, sem cobrir todos os pontos da programação.","Eu tive outra expectativa quanto a este evento de 2 dias. Imaginei que teríamos uma imersão no MRQ e REQ, mas foi mais um overview dos módulos do CTD. Talvez ela planejasse algo com a parte de aplicação prática no dia 2, mas, infelizmente, não foi possível por conta do imprevisto pessoal. Se houve uma nova rodada deste evento, poderia ser apenas 1 dia, e focando mais na parte prática,  para tirar dúvidas e alinhar entendimento entre os associados."],"27647":["Eu amei a palestra, foi além das minhas expectativas. Eu espero poder participar de muitas outras ofertadas pela Sindusfarma! Parabéns!!!","Gostei muito do conteúdo, mas o tempo, infelizmente foi curto."],"27658":["Achei dos melhores cursos ministrados até hoje pelo Sindusfarma.","O Tema está em alta e faltam orientações precisas para elaboração do Projeto de Implantação e acompanhamento, vindo este evento a elucidar as possíveis de adaptarmos as necessidades desta Fundação. Todos os envolvidos estão de Parabéns pela exposição e sucesso do Evento","Parabéns! Excelente conteúdo e domínio sobre o assunto.","Muito bom!"],"27698":["Excelente a apresentação.","a única observação sobre a Claudia Cilento foram as forma ríspida nas palavras","Foi muito produtivo e esclarecedor","Muito enriquecedor! Parabéns!","ÓTIMO EVENTO","Encontro e conteudo muito esclarecedor","Excelente","Muito esclarecedor!","Muito importante a participação de uma palestrante de dentro da ANVISA.","A palestra foi ótimo, muito esclarecedor.","Obrigada","O treinamento foi claro, objetivo e muito bem conduzido. O conteúdo foi apresentado de forma didática e prática, facilitando o entendimento das exigências regulatórias e sua aplicação no dia a dia. Excelente iniciativa para atualização e desenvolvimento profissional.","Identifiquei alguns pontos de melhoria na apresentação. Em primeiro lugar, houve informações que não estavam corretas — como a suposta obrigatoriedade da logo do SUS em embalagens governamentais que não são do Ministério da Saúde, a exigência de espaçamento na concentração (quando aplicável apenas a casos em que a unidade está em UI), e a necessidade de inclusão de informações obrigatórias que não são, entre outros exemplos —, o que pode comprometer a confiabilidade do conteúdo apresentado.  Além disso, a abordagem utilizada foi bastante básica para o perfil dos profissionais presentes, demonstrando um desalinhamento com o nível técnico da audiência. O uso da expressão “a legislação é chata” foi inadequado para o contexto, especialmente considerando a presença de representante da ANVISA no evento — o termo mais apropriado seria “complexa”.  Também foi mencionado que a ANVISA é “muito legal” ou “boazinha” no que tange aos modelos de rotulagem, o que simplifica excessivamente o tema. A construção da legislação e dos modelos de rotulagem é resultado de um trabalho técnico conjunto entre a ANVISA e as empresas, e esse aspecto é importante ser reconhecido.","O evento foi extremamente relevante e agregador, trazendo uma abordagem prática e esclarecedora sobre o marco regulatório de rotulagem de medicamentos.  Parabéns ao Sindusfarma pela organização e pela qualidade do conteúdo apresentado.","Gostaria de agradecer pelo conteúdo apresentado. Foi de suma importância para esclarecer algumas duvidas gerais.","Haviam alguns erros na apresentação em relação à RDC 768 e normas obsoletas.","faltou mais tempo para o retorno de mais dúvidas, pois é um assunto muito complexo","Parabéns pela iniciativa... Muito pertinente o assunto e esclarecedor os tópicos importantes.","A palestra foi esclarecedora","O evento foi muito proveitoso, e os pontos abordados pela Talita foram bastante relevantes, principalmente para esclarecimento de dúvidas. Agradeço pelas contribuições e pela condução clara e objetiva dos temas apresentados. Com relação à palestrante Claudia, entendo que, em alguns momentos, a abordagem utilizada acabou sendo um pouco inadequada, especialmente pelas recorrentes colocações de que o setor regulado seria “preguiçoso” ou “infantil”, além das observações reiteradas de que os participantes deveriam apenas ler a legislação. Considero que esse tipo de posicionamento não está alinhado com a proposta de um evento voltado justamente ao esclarecimento técnico e à troca construtiva de informações. De toda forma, agradeço pela realização do evento e, mais uma vez, destaco a excelente condução da Talita, sempre muito esclarecedora e receptiva às dúvidas apresentadas.","Assunto importante tanto para a área regulatória como também para quem faz atendimento ao consumidor/paciente.","Muito bom o evento, destaque em especial para palestrante Claudia Cilento. Uma didática muito fluida, e de fácil entendimento, além do amplo conhecimento do tema abordado.","Gostaria de agradecer pela realização do evento e pela oportunidade de discussão dos temas apresentados. Em especial, destaco a participação da Talita, que conduziu os assuntos de maneira muito didática, objetiva e sempre aberta aos questionamentos dos participantes, tornando o encontro bastante produtivo.  Por outro lado, acredito que alguns pontos da abordagem utilizada pela palestrante Claudia poderiam ter sido conduzidos de forma mais adequada. Em determinados momentos, comentários relacionados ao setor regulado, como referências a comportamentos “preguiçosos” ou “infantis”, além da insistência de que bastaria aos participantes consultar a legislação, acabaram transmitindo uma percepção pouco alinhada ao propósito de um evento técnico voltado justamente ao esclarecimento de dúvidas e à construção de um diálogo mais colaborativo.  Ainda assim, considero que o evento trouxe conteúdos relevantes e contribuiu positivamente para o entendimento dos temas abordados.","Muito bom!","Conteúdo e apresentações incríveis!","Material muito completo e didática impecável das palestrantes.","O conteúdo foi abordado de forma muito didática, a Claudia é especial! Valeu muito a pena participar!","Excelente!","Foi excelente, agregou bastante.","Excelente","Boa tarde, evento bastante esclarecedor e podemos entender que a 768/2022 é um tema muito importante e relevante.","Informações recebidas muito valiosas","Muito rico e didático.","Maravilhoso, foi tudo ótimo!!!","Muito bom!","O curso foi excelente!","Foi um otimo treinamento. Muito esclarecedor.","Evento de extrema importância!! Adorei participar e agregar mais conhecimentos sobre uma das áreas mais relevantes da nossa legislação contemporânea!! Espero poder participar de outros futuramente !","Excelente apresentação, muito didática.","Material muito rico de informação.","Excelente","Palestrante Claudia trouxe informações incorretas da RDC 768, como, por exemplo: - Dizer que a frase \"Nova Fórmula\" é facultativa, sendo que é obrigatória; - Dizer que o braille é obrigatório nas embalagens primárias, sendo que ele é obrigatório na embalagem secundária, e não primária.","Foi um evento esclarecedor e enriquecedor.","Ótimas apresentações e esclarecimentos.","Excelente Webinar","Evento incrível!","Excelente evento","Muito boa a palestra, importante para confirmar se as praticas da empresa estão em acordo com o entendimento do setor.","Evento bom.","Evento excelente!! As palestrantes demonstraram completo domínio sobre o tema e didática ao transmiti-lo. Sugiro apenas que nas próximas vezes seja planejado um breve intervalo entre as palestras ;)","O curso atendeu as expectativas plenamente. Realmente descomplicou no marco regulatório. Agora ele já não me aprece mais o bicho papão que era alardeado.","Esse evento foi de extrema importância para sanar algumas dúvidas que ainda existiam com relação à RDC 768!","Excelente curso referente a RDC nº 768/2022 , muito importante para que as empresas fiquem alinhadas se adequam a resoluções vigentes.","O evento foi enriquecedor, com conteúdo muito bem aplicado. Gostaria de registrar meu agradecimento aos ministrantes.","Na minha percepção, o evento poderia ter tido uma abordagem mais prática, com maior foco na aplicabilidade do marco regulatório no dia a dia e na discussão de casos concretos, em vez de concentrar grande parte do conteúdo na leitura ou reprodução textual da norma.  Além disso, acredito que o momento destinado às perguntas poderia ter contemplado dúvidas mais diversas e menos recorrentes. Houve bastante enfoque em temas já amplamente discutidos, como “Contém”, lactose e agulhas, enquanto outras questões enviadas pelos participantes, especialmente as menos abordadas nos materiais de perguntas e respostas, acabaram não sendo selecionadas.","Foi um excelente evento! Tivemos a oportunidade de discutir as dúvidas e compartilhar as experiências.","Muito didático as abordagens com exemplos.","Evento muito esclarecedor.","Palestra e conteúdo bastante esclarecedor!","O curso trouxe informações esclarecedores sobre o marco regulatório de rotulagens de medicamentos, principalmente, através da Talita.","A palestra da Talita Lopes foi super pertinente e aplicada. Gostei bastante","Este tema é muito complexo, então, conseguir passar \"o todo\" de forma simples e objetiva foi um desafio. A Claudia foi excelente. Agradeço à Talita por ter nos trazido o cenário atual e por sua imensa paciência em responder às dúvidas que, muitas vezes, são repetitivas e constam no P&R.","Excelente conteúdo e abordagem!","Foi muito bom as orientações da Sandra e os esclarecimentos da Talita. Parabéns Sindusfarma pelo evento!","Tema muito importante para conhecimento e adequação na rotina!  Sindusfarma sempre apresentando os melhores conteúdos, ministrado por excelentes profissionais!","A segunda parte com a participação da Talita foi excelente, deu uma boa visão sobre os principais motivos de exigência e as questões referentes às destinações. Porém, para aprimeira parte minha expectativa era que a palestrante trouxesse uma discussão dos pontos da norma que sempre geraram mais dúvidas e motivaram as publicações de retificação e perguntas e respostas, como as frases relacionadas aos cálculos de substâncias, agulhas, frases relacionadas aos cuidados de conservação e validade após reconstituição/diluição, modo de usar, como descrever os dados do fabricante e detentor de registro na rotulagem. Neste momento, acredito que a grande maioria já realizou a leitura da norma algumas vezes, por isso uma apresentação focada nos principais pontos de dúvidas poderia ter sido mais efetivo.","tema extremamente necessario","Foi muito bom para verificar se estamos alinhados com as práticas da Anvisa.","O curso foi excelente trazendo de forma objetiva os requisitos da norma.","O curso foi ótimo, assunto super importante e as palestrantes incríveis!"],"27721":["Excelente aprendizado  fiscal e tributário, onde acredito ter agregado valor a minha carreira","Ótimo conteúdo.","Evento muito bom, conectou e conscientizou de forma leve!!! Parabéns!.","Excelente!","Muito bacana participar desse evento, conhecer mais sobre o programa OEA, ver como é a realidade de conferencia com os caes, e entender melhor alguns pontos que estao sendo atualizados.","Evento excelente.","Parabéns a Sindusfarma pelo evento instrutivo!","ótimo evento. Triste em não poder ter participado de forma presencial!","A palestra foi simplesmente maravilhosa — extremamente clara, dinâmica e verdadeiramente enriquecedora. Foi uma experiência muito gratificante, que agregou conhecimento de forma leve e envolvente. Parabéns aos organizadores pela excelente condução do evento e aos palestrantes, que demonstraram domínio e dedicação ao compartilhar conteúdo de tanta qualidade!","Adorei, todos os palestrantes ótimos. Parabéns","Evento fantástico.","Excelente evento! a organização, o conteúdo, a qualidade e experiência dos palestrante, e toda INFRA da SINDUSFARMA, vocês são sensacionais!! parabéns.","Muito proveitoso","Uma pena que não pude participar 100% do tempo. Por mais cursos sobre esta capacitação que está ganhando cada vez mais importância e ainda somos tão carentes de informação.","Excelente evento. Tema relevante e estratégico para a Biolab&Co, considerando que mantém compromisso com a segurança e a conformidade dos processos da cadeia logística e de comércio exterior.","Gostei bastante do evento e importante reflexão sobre a certificação e todo o processo envolvido.","mesmo online, adorei a interação com os cães","Achei muito interessante, ver na pratica, como que os cães ajudam durante a investigação e com isso contribuem para uma agilidade nas verificação das cargas.","Gostei bastante do evento, muito bom!"]}};</script>

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"a46bd5f2-e380-4d39-b434-c3093ab9e6eb\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n*{box-sizing:border-box;}\nhtml,body{margin:0;}\nbody{background:#0b1733;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;}\n::-webkit-scrollbar{width:8px;height:8px;}\n::-webkit-scrollbar-track{background:transparent;}\n::-webkit-scrollbar-thumb{background:#26416c;border-radius:4px;}\nselect option{background:#0e1c3d;color:#f0f6ff;}\ninput::placeholder{color:#5f80a3;}\n<\u002Fstyle>\n<script src=\"2ed0ea88-d08e-4786-9a0e-0d12d9e0fbc7\"><\u002Fscript>\n<\u002Fhelmet>\n\n\n\n<div style=\"min-height:100vh;background:#0b1733;\">\n<div style=\"max-width:960px;margin:0 auto;padding:26px 26px 56px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:#f0f6ff;\">\n\n  <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px;\">\n    <div>\n      <h1 style=\"font-size:24px;font-weight:800;letter-spacing:-0.01em;margin:0 0 5px;color:#f0f6ff;\">Comentários das Pesquisas<\u002Fh1>\n      <p style=\"font-size:13px;color:#9fc0db;margin:0;\">Programa Educacional · leitura detalhada por curso<\u002Fp>\n    <\u002Fdiv>\n    <a href=\"https://nathansindus.github.io/pesquisas_qualidade1/dashboard_pesquisas_qualidade.html\" style=\"display:inline-flex;align-items:center;gap:7px;padding:8px 14px;background:#0e1c3d;border:1px solid #25406b;color:#9fc0db;border-radius:9px;font-size:13px;font-weight:600;text-decoration:none;\">\n      <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M19 12H5M12 19l-7-7 7-7\"><\u002Fpath><\u002Fsvg>\n      Voltar ao dashboard\n    <\u002Fa>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px;\">\n    <div style=\"display:flex;flex-direction:column;gap:5px;flex:1;min-width:280px;\">\n      <label style=\"font-size:10px;font-weight:700;color:#00e5c0;text-transform:uppercase;letter-spacing:0.06em;\">Curso<\u002Flabel>\n      <select value=\"{{ selVal }}\" onchange=\"{{ onSelect }}\" style=\"background:#0e1c3d;border:1px solid #25406b;color:#f0f6ff;padding:9px 12px;border-radius:8px;font-size:13px;cursor:pointer;width:100%;\">\n        <sc-for list=\"{{ cursoOptions }}\" as=\"o\" hint-placeholder-count=\"6\"><option value=\"{{ o.idStr }}\">{{ o.curso }}<\u002Foption><\u002Fsc-for>\n      <\u002Fselect>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:6px;\">\n      <button onclick=\"{{ goPrev }}\" style=\"{{ prevStyle }}\">← Anterior<\u002Fbutton>\n      <button onclick=\"{{ goNext }}\" style=\"{{ nextStyle }}\">Próximo →<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ notLoaded }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:70px;text-align:center;color:#6f93b5;font-size:14px;\">Carregando dados…<\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ loaded }}\" hint-placeholder-val=\"{{ true }}\">\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:18px;\">\n      <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"5\">\n        <div style=\"background:#0e1c3d;border:1px solid #25406b;border-radius:12px;padding:14px 16px;\">\n          <div style=\"font-size:26px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;color:{{ k.color }};\">{{ k.val }}<\u002Fdiv>\n          <div style=\"font-size:11px;color:#9fc0db;margin-top:5px;\">{{ k.lbl }}<\u002Fdiv>\n          <sc-if value=\"{{ k.sub }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:10px;font-weight:700;margin-top:3px;color:{{ k.color }};\">{{ k.sub }}<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"background:#0e1c3d;border:1px solid #25406b;border-radius:14px;padding:16px 18px;margin-bottom:20px;\">\n      <div style=\"font-size:17px;font-weight:700;color:#f0f6ff;line-height:1.3;margin-bottom:6px;\">{{ curso.title }}<\u002Fdiv>\n      <div style=\"font-size:12px;color:#9fc0db;margin-bottom:10px;\">{{ curso.meta }}<\u002Fdiv>\n      <div style=\"display:flex;gap:7px;flex-wrap:wrap;align-items:center;\">\n        <span style=\"font-size:10.5px;padding:3px 9px;border-radius:99px;background:#0f3a2e;color:#00e5c0;border:1px solid #0d4c38;\">{{ curso.area }}<\u002Fspan>\n        <span style=\"font-size:10.5px;padding:3px 9px;border-radius:99px;background:#1a1a4a;color:#a7a7ff;border:1px solid #2a2a6a;\">{{ curso.mod }}<\u002Fspan>\n        <sc-if value=\"{{ curso.small }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10.5px;padding:3px 9px;border-radius:99px;background:#3a2a0a;color:#ffc15e;border:1px solid #5a3f12;\">amostra pequena<\u002Fspan><\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px;\">\n      <div style=\"display:flex;align-items:center;gap:9px;font-size:12px;font-weight:700;color:#00e5c0;text-transform:uppercase;letter-spacing:0.06em;\">\n        <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg>\n        Comentários\n        <span style=\"background:#0f3a2e;color:#00e5c0;border:1px solid #0d4c38;font-size:11px;padding:2px 9px;border-radius:99px;\">{{ commentCount }}<\u002Fspan>\n      <\u002Fdiv>\n      <input value=\"{{ searchVal }}\" onchange=\"{{ onSearch }}\" placeholder=\"Buscar nos comentários...\" style=\"background:#0e1c3d;border:1px solid #25406b;color:#f0f6ff;padding:8px 12px;border-radius:8px;font-size:13px;min-width:240px;\">\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ hasComments }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;flex-direction:column;gap:10px;\">\n        <sc-for list=\"{{ comments }}\" as=\"c\" hint-placeholder-count=\"6\">\n          <div style=\"background:#0e1c3d;border:1px solid #25406b;border-radius:11px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;\">\n            <span style=\"font-size:11px;font-weight:700;color:#3f5f80;font-variant-numeric:tabular-nums;flex-shrink:0;padding-top:2px;\">{{ c.num }}<\u002Fspan>\n            <p style=\"margin:0;color:#cfe4f5;font-size:13.5px;line-height:1.7;\">{{ c.text }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ noComments }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#0e1c3d;border:1px dashed #25406b;border-radius:12px;padding:50px 20px;text-align:center;color:#6f93b5;font-size:13.5px;\">{{ emptyMsg }}<\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { data:null, selectedId:null, search:'' };\n\n  componentDidMount(){\n    const t=()=>{\n      if(window.__CDATA__){\n        const D=window.__CDATA__;\n        let id=null;\n        try{ const p=new URLSearchParams(window.location.search).get('id'); if(p) id=parseInt(p); }catch(e){}\n        if(!id || !D.eventos.find(e=>e.id===id)) id=D.eventos.length?D.eventos[0].id:null;\n        this.setState({data:D, selectedId:id});\n      } else setTimeout(t,60);\n    };\n    t();\n  }\n\n  serialToDate(s){ return new Date((s-25569)*86400*1000); }\n  fmtData(d){ if(d==null) return ''; if(typeof d==='number'){ const dt=this.serialToDate(d); return String(dt.getUTCDate()).padStart(2,'0')+'/'+String(dt.getUTCMonth()+1).padStart(2,'0')+'/'+dt.getUTCFullYear(); } return String(d); }\n  npsColor(n){ return n>=80?'#00e5c0':n>=60?'#ffc15e':'#ff6b6b'; }\n  npsLabel(n){ return n>=80?'Excelente':n>=60?'Bom':'Atenção'; }\n  fmtPct(v){ return Math.round(v*100)+'%'; }\n\n  sortedEvents(){ const D=this.state.data; if(!D) return []; return [...D.eventos].sort((a,b)=>a.curso.localeCompare(b.curso)); }\n  go(delta){ const list=this.sortedEvents(); const i=list.findIndex(e=>e.id===this.state.selectedId); const ni=i+delta; if(ni<0||ni>=list.length) return; this.setState({selectedId:list[ni].id, search:''}); }\n\n  renderVals(){\n    const D=this.state.data; const loaded=!!D;\n    const list=this.sortedEvents();\n    const cursoOptions=list.map(e=>({idStr:String(e.id), curso:e.curso}));\n    const ev=loaded? D.eventos.find(e=>e.id===this.state.selectedId) : null;\n    const allComs=(ev && D.comentarios[String(ev.id)]) ? D.comentarios[String(ev.id)] : [];\n    const q=this.state.search.trim().toLowerCase();\n    const filtered=q? allComs.filter(c=>String(c).toLowerCase().includes(q)) : allComs;\n    const comments=filtered.map((c,i)=>({num:String(i+1), text:String(c)}));\n\n    let kpis=[]; let curso={title:'',meta:'',area:'',mod:'',small:false};\n    if(ev){\n      kpis=[\n        {val:String(allComs.length),lbl:'Comentários',color:'#00e5c0',sub:''},\n        {val:String(ev.aval),lbl:'Avaliações',color:'#f0f6ff',sub:''},\n        {val:String(ev.nps),lbl:'NPS Geral',color:this.npsColor(ev.nps),sub:this.npsLabel(ev.nps)},\n        {val:ev.nota.toFixed(1),lbl:'Nota média',color:'#f0f6ff',sub:''},\n        {val:this.fmtPct(ev.taxa),lbl:'Taxa de resposta',color:'#f0f6ff',sub:''}\n      ];\n      curso={ title:ev.curso, meta:this.fmtData(ev.data)+' · '+ev.inscritos+' inscritos · '+ev.confirmados+' confirmados', area:ev.area, mod:ev.mod, small:ev.aval<20 };\n    }\n\n    const idx=list.findIndex(e=>e.id===this.state.selectedId);\n    const hasPrev=idx>0, hasNext=idx>=0 && idx<list.length-1;\n    const navOn='padding:9px 13px;border-radius:8px;border:1px solid #25406b;background:#0e1c3d;color:#9fc0db;font-size:13px;font-weight:600;cursor:pointer;';\n    const navOff='padding:9px 13px;border-radius:8px;border:1px solid #18294a;background:#0b1733;color:#3f5f80;font-size:13px;font-weight:600;cursor:default;';\n\n    return {\n      loaded, notLoaded:!loaded,\n      cursoOptions, selVal:String(this.state.selectedId),\n      onSelect:e=>this.setState({selectedId:parseInt(e.target.value), search:''}),\n      goPrev:()=>this.go(-1), goNext:()=>this.go(1),\n      prevStyle:hasPrev?navOn:navOff, nextStyle:hasNext?navOn:navOff,\n      kpis, curso,\n      searchVal:this.state.search, onSearch:e=>this.setState({search:e.target.value}),\n      comments, commentCount:comments.length,\n      hasComments:comments.length>0, noComments:loaded&&comments.length===0,\n      emptyMsg: q? 'Nenhum comentário corresponde à busca.' : 'Nenhum comentário registrado para este curso.'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
