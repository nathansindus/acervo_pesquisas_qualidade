    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.

      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>

      window.Babel.transformScriptTags();
    }

    console.error('Bundle unpack error:', err);

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"a46bd5f2-e380-4d39-b434-c3093ab9e6eb\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n*{box-sizing:border-box;}\nhtml,body{margin:0;}\nbody{background:#0b1733;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;}\n::-webkit-scrollbar{width:8px;height:8px;}\n::-webkit-scrollbar-track{background:transparent;}\n::-webkit-scrollbar-thumb{background:#26416c;border-radius:4px;}\nselect option{background:#0e1c3d;color:#f0f6ff;}\ninput::placeholder{color:#5f80a3;}\n<\u002Fstyle>\n<script src=\"2ed0ea88-d08e-4786-9a0e-0d12d9e0fbc7\"><\u002Fscript>\n<\u002Fhelmet>\n\n\n\n<div style=\"min-height:100vh;background:#0b1733;\">\n<div style=\"max-width:960px;margin:0 auto;padding:26px 26px 56px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:#f0f6ff;\">\n\n  <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px;\">\n    <div>\n      <h1 style=\"font-size:24px;font-weight:800;letter-spacing:-0.01em;margin:0 0 5px;color:#f0f6ff;\">Comentários das Pesquisas<\u002Fh1>\n      <p style=\"font-size:13px;color:#9fc0db;margin:0;\">Programa Educacional · leitura detalhada por curso<\u002Fp>\n    <\u002Fdiv>\n    <a href=\"https://nathansindus.github.io/pesquisas_qualidade1/dashboard_pesquisas_qualidade.html\" style=\"display:inline-flex;align-items:center;gap:7px;padding:8px 14px;background:#0e1c3d;border:1px solid #25406b;color:#9fc0db;border-radius:9px;font-size:13px;font-weight:600;text-decoration:none;\">\n      <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M19 12H5M12 19l-7-7 7-7\"><\u002Fpath><\u002Fsvg>\n      Voltar ao dashboard\n    <\u002Fa>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px;\">\n    <div style=\"display:flex;flex-direction:column;gap:5px;flex:1;min-width:280px;\">\n      <label style=\"font-size:10px;font-weight:700;color:#00e5c0;text-transform:uppercase;letter-spacing:0.06em;\">Curso<\u002Flabel>\n      <select value=\"{{ selVal }}\" onchange=\"{{ onSelect }}\" style=\"background:#0e1c3d;border:1px solid #25406b;color:#f0f6ff;padding:9px 12px;border-radius:8px;font-size:13px;cursor:pointer;width:100%;\">\n        <sc-for list=\"{{ cursoOptions }}\" as=\"o\" hint-placeholder-count=\"6\"><option value=\"{{ o.idStr }}\">{{ o.curso }}<\u002Foption><\u002Fsc-for>\n      <\u002Fselect>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:6px;\">\n      <button onclick=\"{{ goPrev }}\" style=\"{{ prevStyle }}\">← Anterior<\u002Fbutton>\n      <button onclick=\"{{ goNext }}\" style=\"{{ nextStyle }}\">Próximo →<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ notLoaded }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:70px;text-align:center;color:#6f93b5;font-size:14px;\">Carregando dados…<\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ loaded }}\" hint-placeholder-val=\"{{ true }}\">\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:18px;\">\n      <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"5\">\n        <div style=\"background:#0e1c3d;border:1px solid #25406b;border-radius:12px;padding:14px 16px;\">\n          <div style=\"font-size:26px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;color:{{ k.color }};\">{{ k.val }}<\u002Fdiv>\n          <div style=\"font-size:11px;color:#9fc0db;margin-top:5px;\">{{ k.lbl }}<\u002Fdiv>\n          <sc-if value=\"{{ k.sub }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:10px;font-weight:700;margin-top:3px;color:{{ k.color }};\">{{ k.sub }}<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"background:#0e1c3d;border:1px solid #25406b;border-radius:14px;padding:16px 18px;margin-bottom:20px;\">\n      <div style=\"font-size:17px;font-weight:700;color:#f0f6ff;line-height:1.3;margin-bottom:6px;\">{{ curso.title }}<\u002Fdiv>\n      <div style=\"font-size:12px;color:#9fc0db;margin-bottom:10px;\">{{ curso.meta }}<\u002Fdiv>\n      <div style=\"display:flex;gap:7px;flex-wrap:wrap;align-items:center;\">\n        <span style=\"font-size:10.5px;padding:3px 9px;border-radius:99px;background:#0f3a2e;color:#00e5c0;border:1px solid #0d4c38;\">{{ curso.area }}<\u002Fspan>\n        <span style=\"font-size:10.5px;padding:3px 9px;border-radius:99px;background:#1a1a4a;color:#a7a7ff;border:1px solid #2a2a6a;\">{{ curso.mod }}<\u002Fspan>\n        <sc-if value=\"{{ curso.small }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10.5px;padding:3px 9px;border-radius:99px;background:#3a2a0a;color:#ffc15e;border:1px solid #5a3f12;\">amostra pequena<\u002Fspan><\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px;\">\n      <div style=\"display:flex;align-items:center;gap:9px;font-size:12px;font-weight:700;color:#00e5c0;text-transform:uppercase;letter-spacing:0.06em;\">\n        <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg>\n        Comentários\n        <span style=\"background:#0f3a2e;color:#00e5c0;border:1px solid #0d4c38;font-size:11px;padding:2px 9px;border-radius:99px;\">{{ commentCount }}<\u002Fspan>\n      <\u002Fdiv>\n      <input value=\"{{ searchVal }}\" onchange=\"{{ onSearch }}\" placeholder=\"Buscar nos comentários...\" style=\"background:#0e1c3d;border:1px solid #25406b;color:#f0f6ff;padding:8px 12px;border-radius:8px;font-size:13px;min-width:240px;\">\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ hasComments }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;flex-direction:column;gap:10px;\">\n        <sc-for list=\"{{ comments }}\" as=\"c\" hint-placeholder-count=\"6\">\n          <div style=\"background:#0e1c3d;border:1px solid #25406b;border-radius:11px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;\">\n            <span style=\"font-size:11px;font-weight:700;color:#3f5f80;font-variant-numeric:tabular-nums;flex-shrink:0;padding-top:2px;\">{{ c.num }}<\u002Fspan>\n            <p style=\"margin:0;color:#cfe4f5;font-size:13.5px;line-height:1.7;\">{{ c.text }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ noComments }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#0e1c3d;border:1px dashed #25406b;border-radius:12px;padding:50px 20px;text-align:center;color:#6f93b5;font-size:13.5px;\">{{ emptyMsg }}<\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { data:null, selectedId:null, search:'' };\n\n  componentDidMount(){\n    const t=()=>{\n      if(window.__CDATA__){\n        const D=window.__CDATA__;\n        let id=null;\n        try{ const p=new URLSearchParams(window.location.search).get('id'); if(p) id=parseInt(p); }catch(e){}\n        if(!id || !D.eventos.find(e=>e.id===id)) id=D.eventos.length?D.eventos[0].id:null;\n        this.setState({data:D, selectedId:id});\n      } else setTimeout(t,60);\n    };\n    t();\n  }\n\n  serialToDate(s){ return new Date((s-25569)*86400*1000); }\n  fmtData(d){ if(d==null) return ''; if(typeof d==='number'){ const dt=this.serialToDate(d); return String(dt.getUTCDate()).padStart(2,'0')+'/'+String(dt.getUTCMonth()+1).padStart(2,'0')+'/'+dt.getUTCFullYear(); } return String(d); }\n  npsColor(n){ return n>=80?'#00e5c0':n>=60?'#ffc15e':'#ff6b6b'; }\n  npsLabel(n){ return n>=80?'Excelente':n>=60?'Bom':'Atenção'; }\n  fmtPct(v){ return Math.round(v*100)+'%'; }\n\n  sortedEvents(){ const D=this.state.data; if(!D) return []; return [...D.eventos].sort((a,b)=>a.curso.localeCompare(b.curso)); }\n  go(delta){ const list=this.sortedEvents(); const i=list.findIndex(e=>e.id===this.state.selectedId); const ni=i+delta; if(ni<0||ni>=list.length) return; this.setState({selectedId:list[ni].id, search:''}); }\n\n  renderVals(){\n    const D=this.state.data; const loaded=!!D;\n    const list=this.sortedEvents();\n    const cursoOptions=list.map(e=>({idStr:String(e.id), curso:e.curso}));\n    const ev=loaded? D.eventos.find(e=>e.id===this.state.selectedId) : null;\n    const allComs=(ev && D.comentarios[String(ev.id)]) ? D.comentarios[String(ev.id)] : [];\n    const q=this.state.search.trim().toLowerCase();\n    const filtered=q? allComs.filter(c=>String(c).toLowerCase().includes(q)) : allComs;\n    const comments=filtered.map((c,i)=>({num:String(i+1), text:String(c)}));\n\n    let kpis=[]; let curso={title:'',meta:'',area:'',mod:'',small:false};\n    if(ev){\n      kpis=[\n        {val:String(allComs.length),lbl:'Comentários',color:'#00e5c0',sub:''},\n        {val:String(ev.aval),lbl:'Avaliações',color:'#f0f6ff',sub:''},\n        {val:String(ev.nps),lbl:'NPS Geral',color:this.npsColor(ev.nps),sub:this.npsLabel(ev.nps)},\n        {val:ev.nota.toFixed(1),lbl:'Nota média',color:'#f0f6ff',sub:''},\n        {val:this.fmtPct(ev.taxa),lbl:'Taxa de resposta',color:'#f0f6ff',sub:''}\n      ];\n      curso={ title:ev.curso, meta:this.fmtData(ev.data)+' · '+ev.inscritos+' inscritos · '+ev.confirmados+' confirmados', area:ev.area, mod:ev.mod, small:ev.aval<20 };\n    }\n\n    const idx=list.findIndex(e=>e.id===this.state.selectedId);\n    const hasPrev=idx>0, hasNext=idx>=0 && idx<list.length-1;\n    const navOn='padding:9px 13px;border-radius:8px;border:1px solid #25406b;background:#0e1c3d;color:#9fc0db;font-size:13px;font-weight:600;cursor:pointer;';\n    const navOff='padding:9px 13px;border-radius:8px;border:1px solid #18294a;background:#0b1733;color:#3f5f80;font-size:13px;font-weight:600;cursor:default;';\n\n    return {\n      loaded, notLoaded:!loaded,\n      cursoOptions, selVal:String(this.state.selectedId),\n      onSelect:e=>this.setState({selectedId:parseInt(e.target.value), search:''}),\n      goPrev:()=>this.go(-1), goNext:()=>this.go(1),\n      prevStyle:hasPrev?navOn:navOff, nextStyle:hasNext?navOn:navOff,\n      kpis, curso,\n      searchVal:this.state.search, onSearch:e=>this.setState({search:e.target.value}),\n      comments, commentCount:comments.length,\n      hasComments:comments.length>0, noComments:loaded&&comments.length===0,\n      emptyMsg: q? 'Nenhum comentário corresponde à busca.' : 'Nenhum comentário registrado para este curso.'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
