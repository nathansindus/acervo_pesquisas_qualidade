  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"828442de-aee1-49d7-9040-41ec4c3eae7e\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n*{box-sizing:border-box;}\nhtml,body{margin:0;}\nbody{background:#0b1733;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;}\n::-webkit-scrollbar{width:8px;height:8px;}\n::-webkit-scrollbar-track{background:transparent;}\n::-webkit-scrollbar-thumb{background:#26416c;border-radius:4px;}\nselect option{background:#0e1c3d;color:#f0f6ff;}\ninput::placeholder{color:#5f80a3;}\n<\u002Fstyle>\n<script src=\"bcfc6b41-23a7-4745-bfd9-b85ce24bd989\"><\u002Fscript>\n<\u002Fhelmet>\n\n\n<div style=\"min-height:100vh;background:#0b1733;\">\n<div style=\"max-width:1320px;margin:0 auto;padding:26px 26px 56px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:#f0f6ff;\">\n\n  <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px;\">\n    <div>\n      <h1 style=\"font-size:24px;font-weight:800;letter-spacing:-0.01em;margin:0 0 5px;color:#f0f6ff;\">Pesquisas de Qualidade<\u002Fh1>\n      <p style=\"font-size:13px;color:#9fc0db;margin:0;\">Programa Educacional · análise de satisfação dos eventos<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:10px;align-items:center;flex-wrap:wrap;\">\n      <div style=\"display:flex;background:#0e1c3d;border:1px solid #25406b;border-radius:9px;padding:3px;gap:2px;\">\n        <button onclick=\"{{ goPainel }}\" style=\"{{ painelTab }}\">Painel<\u002Fbutton>\n        <button onclick=\"{{ goAcervo }}\" style=\"{{ acervoTab }}\">Acervo<\u002Fbutton>\n      <\u002Fdiv>\n      <button onclick=\"{{ exportCSV }}\" style=\"display:inline-flex;align-items:center;gap:7px;padding:8px 14px;background:#0e1c3d;border:1px solid #25406b;color:#9fc0db;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3\"><\u002Fpath><\u002Fsvg>\n        Exportar CSV\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px;\">\n    <div style=\"display:flex;flex-direction:column;gap:5px;\">\n      <label style=\"font-size:10px;font-weight:700;color:#00e5c0;text-transform:uppercase;letter-spacing:0.06em;\">Área<\u002Flabel>\n      <select value=\"{{ areaVal }}\" onchange=\"{{ onArea }}\" style=\"background:#0e1c3d;border:1px solid #25406b;color:#f0f6ff;padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;min-width:190px;\">\n        <option value=\"\">Todas<\u002Foption>\n        <sc-for list=\"{{ areas }}\" as=\"a\" hint-placeholder-count=\"0\"><option value=\"{{ a }}\">{{ a }}<\u002Foption><\u002Fsc-for>\n      <\u002Fselect>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:5px;\">\n      <label style=\"font-size:10px;font-weight:700;color:#00e5c0;text-transform:uppercase;letter-spacing:0.06em;\">Modalidade<\u002Flabel>\n      <select value=\"{{ modVal }}\" onchange=\"{{ onMod }}\" style=\"background:#0e1c3d;border:1px solid #25406b;color:#f0f6ff;padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;min-width:150px;\">\n        <option value=\"\">Todas<\u002Foption>\n        <option value=\"Online\">Online<\u002Foption>\n        <option value=\"Presencial\">Presencial<\u002Foption>\n        <option value=\"Híbrido\">Híbrido<\u002Foption>\n      <\u002Fselect>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:5px;\">\n      <label style=\"font-size:10px;font-weight:700;color:#00e5c0;text-transform:uppercase;letter-spacing:0.06em;\">Mês / Ano<\u002Flabel>\n      <select value=\"{{ mesVal }}\" onchange=\"{{ onMes }}\" style=\"background:#0e1c3d;border:1px solid #25406b;color:#f0f6ff;padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;min-width:160px;\">\n        <option value=\"\">Todos<\u002Foption>\n        <sc-for list=\"{{ meses }}\" as=\"m\" hint-placeholder-count=\"0\"><option value=\"{{ m.key }}\">{{ m.label }}<\u002Foption><\u002Fsc-for>\n      <\u002Fselect>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:5px;flex:1;min-width:200px;\">\n      <label style=\"font-size:10px;font-weight:700;color:#00e5c0;text-transform:uppercase;letter-spacing:0.06em;\">Buscar curso<\u002Flabel>\n      <input value=\"{{ searchVal }}\" onchange=\"{{ onSearch }}\" placeholder=\"Digite o nome do curso...\" style=\"background:#0e1c3d;border:1px solid #25406b;color:#f0f6ff;padding:8px 12px;border-radius:8px;font-size:13px;width:100%;\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ hasActiveFilters }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px;\">\n      <span style=\"font-size:11px;color:#6f93b5;\">Filtros ativos:<\u002Fspan>\n      <sc-for list=\"{{ activeChips }}\" as=\"chip\" hint-placeholder-count=\"0\">\n        <button onclick=\"{{ chip.onRemove }}\" style=\"display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:#13284d;border:1px solid #25406b;color:#cfe4f5;border-radius:99px;font-size:12px;cursor:pointer;\">{{ chip.label }} <span style=\"color:#6f93b5;\">×<\u002Fspan><\u002Fbutton>\n      <\u002Fsc-for>\n      <button onclick=\"{{ clearFilters }}\" style=\"font-size:12px;color:#9fc0db;background:none;border:none;cursor:pointer;text-decoration:underline;\">Limpar tudo<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ notLoaded }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:70px;text-align:center;color:#6f93b5;font-size:14px;\">Carregando dados…<\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ loaded }}\" hint-placeholder-val=\"{{ true }}\">\n\n    <sc-if value=\"{{ isPainel }}\" hint-placeholder-val=\"{{ true }}\">\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px;\">\n        <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"7\">\n          <div style=\"background:#0e1c3d;border:1px solid #25406b;border-radius:12px;padding:14px 16px;\">\n            <div style=\"font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;color:{{ k.color }};\">{{ k.val }}<\u002Fdiv>\n            <div style=\"font-size:11px;color:#9fc0db;margin-top:5px;\">{{ k.lbl }}<\u002Fdiv>\n            <sc-if value=\"{{ k.sub }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:10px;font-weight:700;margin-top:3px;color:{{ k.color }};\">{{ k.sub }}<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;\">\n        <div style=\"flex:2;min-width:430px;background:#0e1c3d;border:1px solid #25406b;border-radius:14px;overflow:hidden;\">\n          <div style=\"background:#122549;padding:11px 15px;font-size:11.5px;font-weight:700;color:#00e5c0;text-transform:uppercase;letter-spacing:0.05em;\">Tendência mensal — NPS ponderado e volume<\u002Fdiv>\n          <div style=\"padding:14px 16px 10px;\">\n            <div style=\"display:flex;gap:18px;margin-bottom:8px;font-size:11px;color:#9fc0db;\">\n              <span style=\"display:inline-flex;align-items:center;gap:6px;\"><span style=\"width:14px;height:3px;background:#00e5c0;border-radius:2px;display:inline-block;\"><\u002Fspan>NPS ponderado<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;gap:6px;\"><span style=\"width:11px;height:11px;background:rgba(0,229,192,0.22);border-radius:2px;display:inline-block;\"><\u002Fspan>Avaliações<\u002Fspan>\n            <\u002Fdiv>\n            {{ trendChart }}\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:280px;background:#0e1c3d;border:1px solid #25406b;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;\">\n          <div style=\"background:#122549;padding:11px 15px;font-size:11.5px;font-weight:700;color:#00e5c0;text-transform:uppercase;letter-spacing:0.05em;\">Alertas · {{ alertCount }}<\u002Fdiv>\n          <div style=\"padding:10px;overflow-y:auto;max-height:310px;\">\n            <sc-if value=\"{{ hasAlerts }}\" hint-placeholder-val=\"{{ true }}\">\n              <sc-for list=\"{{ alerts }}\" as=\"al\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ al.onClick }}\" style=\"display:block;text-align:left;width:100%;background:#0b1733;border:1px solid #1c3257;border-radius:9px;padding:10px 12px;margin-bottom:8px;cursor:pointer;\">\n                  <div style=\"font-size:12.5px;font-weight:600;color:#f0f6ff;line-height:1.3;margin-bottom:6px;\">{{ al.curso }}<\u002Fdiv>\n                  <div style=\"display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;\">\n                    <sc-for list=\"{{ al.flags }}\" as=\"f\" hint-placeholder-count=\"0\">\n                      <span style=\"font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;border:1px solid #25406b;color:{{ f.c }};\">{{ f.t }}<\u002Fspan>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <div style=\"font-size:11px;color:#9fc0db;\">NPS <strong style=\"color:{{ al.npsColor }};\">{{ al.nps }}<\u002Fstrong> · {{ al.aval }} aval · {{ al.taxa }} resp.<\u002Fdiv>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noAlerts }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:34px 12px;text-align:center;color:#6f93b5;font-size:12.5px;\">Nenhum curso requer atenção no período.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:16px;flex-wrap:wrap;\">\n        <div style=\"flex:1.1;min-width:300px;background:#0e1c3d;border:1px solid #25406b;border-radius:14px;overflow:hidden;\">\n          <div style=\"background:#122549;padding:11px 15px;font-size:11.5px;font-weight:700;color:#00e5c0;text-transform:uppercase;letter-spacing:0.05em;\">NPS por área<\u002Fdiv>\n          <div style=\"padding:15px 16px 8px;\">\n            <sc-for list=\"{{ areaStats }}\" as=\"a\" hint-placeholder-count=\"5\">\n              <div style=\"margin-bottom:13px;\">\n                <div style=\"display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;gap:10px;\">\n                  <span style=\"color:#e3eefb;\">{{ a.area }}<\u002Fspan>\n                  <span style=\"font-weight:800;color:{{ a.color }};font-variant-numeric:tabular-nums;\">{{ a.nps }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"height:8px;background:#0b1733;border-radius:5px;overflow:hidden;\">\n                  <div style=\"height:100%;border-radius:5px;width:{{ a.pct }}%;background:{{ a.color }};\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-size:10.5px;color:#6f93b5;margin-top:3px;\">{{ a.count }} eventos · {{ a.aval }} avaliações<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:250px;background:#0e1c3d;border:1px solid #25406b;border-radius:14px;overflow:hidden;\">\n          <div style=\"background:#122549;padding:11px 15px;font-size:11.5px;font-weight:700;color:#00e5c0;text-transform:uppercase;letter-spacing:0.05em;\">Por modalidade<\u002Fdiv>\n          <div style=\"padding:6px 16px 8px;\">\n            <sc-for list=\"{{ modStats }}\" as=\"m\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;paddin -align:center;color:#6f93b5;font-size:12px;\">Sem cursos com amostra suficiente.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isAcervo }}\" hint-placeholder-val=\"{{ false }}\">\n\n      <div style=\"display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px;\">\n        <div style=\"font-size:12px;color:#9fc0db;\"><strong style=\"color:#f0f6ff;\">{{ resultCount }}<\u002Fstrong> cursos<\u002Fdiv>\n        <div style=\"display:flex;gap:6px;flex-wrap:wrap;align-items:center;\">\n          <span style=\"font-size:11px;color:#6f93b5;\">Ordenar:<\u002Fspan>\n          <sc-for list=\"{{ sortBtns }}\" as=\"s\" hint-placeholder-count=\"6\">\n            <button onclick=\"{{ s.onClick }}\" style=\"{{ s.style }}\">{{ s.label }} {{ s.arrow }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start;\">\n        <div style=\"flex:1.3;min-width:340px;background:#0e1c3d;border:1px solid #25406b;border-radius:14px;overflow:hidden;\">\n          <div style=\"background:#122549;padding:11px 15px;font-size:11.5px;font-weight:700;color:#00e5c0;text-transform:uppercase;letter-spacing:0.05em;\">Cursos<\u002Fdiv>\n          <div style=\"max-height:580px;overflow-y:auto;\">\n            <sc-if value=\"{{ hasCourses }}\" hint-placeholder-val=\"{{ true }}\">\n              <sc-for list=\"{{ courses }}\" as=\"c\" hint-placeholder-count=\"6\">\n                <button onclick=\"{{ c.onClick }}\" style=\"display:block;width:100%;text-align:left;border:none;border-bottom:1px solid #16294a;border-left:3px solid {{ c.selBorder }};background:{{ c.selBg }};padding:12px 14px;cursor:pointer;\">\n                  <div style=\"display:flex;justify-content:space-between;gap:10px;align-items:flex-start;\">\n                    <div style=\"font-size:13px;font-weight:600;color:#f0f6ff;line-height:1.3;\">{{ c.curso }}<\u002Fdiv>\n                    <div style=\"text-align:right;flex-shrink:0;\">\n                      <div style=\"font-size:15px;font-weight:800;color:{{ c.npsColor }};font-variant-numeric:tabular-nums;\">{{ c.nps }}<\u002Fdiv>\n                      <div style=\"font-size:9px;font-weight:700;color:{{ c.npsColor }};text-transform:uppercase;letter-spacing:0.04em;\">{{ c.npsLabel }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font-size:11px;color:#9fc0db;margin:4px 0 7px;\">{{ c.date }}<\u002Fdiv>\n                  <div style=\"display:flex;gap:6px;flex-wrap:wrap;align-items:center;\">\n                    <span style=\"font-size:10px;padding:2px 7px;border-radius:99px;background:#0f3a2e;color:#00e5c0;border:1px solid #0d4c38;\">{{ c.area }}<\u002Fspan>\n                    <span style=\"font-size:10px;padding:2px 7px;border-radius:99px;background:#1a1a4a;color:#a7a7ff;border:1px solid #2a2a6a;\">{{ c.mod }}<\u002Fspan>\n                    <span style=\"font-size:10.5px;color:#9fc0db;\">{{ c.aval }} aval · {{ c.taxa }} resp<\u002Fspan>\n                    <sc-if value=\"{{ c.small }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10px;padding:2px 7px;border-radius:99px;background:#3a2a0a;color:#ffc15e;border:1px solid #5a3f12;\">amostra pequena<\u002Fspan><\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ emptyState }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:44px;text-align:center;color:#6f93b5;font-size:13px;\">Nenhum curso encontrado com os filtros atuais.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:1;min-width:320px;background:#0e1c3d;border:1px solid #25406b;border-radius:14px;overflow:hidden;\">\n          <div style=\"background:#122549;padding:11px 15px;font-size:11.5px;font-weight:700;color:#00e5c0;text-transform:uppercase;letter-spacing:0.05em;\">Detalhes<\u002Fdiv>\n          <sc-if value=\"{{ hasDetail }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:16px;max-height:580px;overflow-y:auto;\">\n              <div style=\"font-size:15px;font-weight:800;color:#00e5c0;line-height:1.3;margin-bottom:5px;\">{{ detail.curso }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#9fc0db;margin-bottom:6px;\">{{ detail.meta }}<\u002Fdiv>\n              <sc-if value=\"{{ detail.small }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"display:inline-block;font-size:10.5px;padding:3px 9px;border-radius:99px;background:#3a2a0a;color:#ffc15e;border:1px solid #5a3f12;margin-bottom:12px;\">amostra pequena — interpretar com cautela<\u002Fdiv><\u002Fsc-if>\n              <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0 18px;\">\n                <sc-for list=\"{{ detail.kpis }}\" as=\"dk\" hint-placeholder-count=\"6\">\n                  <div style=\"background:#0b1733;border:1px solid #1c3257;border-radius:9px;padding:10px;text-align:center;\">\n                    <div style=\"font-size:19px;font-weight:800;font-variant-numeric:tabular-nums;color:{{ dk.color }};\">{{ dk.val }}<\u002Fdiv>\n                    <div style=\"font-size:10px;color:#9fc0db;margin-top:2px;\">{{ dk.lbl }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <sc-if value=\"{{ detail.hasPals }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-size:11px;font-weight:700;color:#00e5c0;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;\">Palestrantes · {{ detail.palCount }}<\u002Fdiv>\n                <sc-for list=\"{{ detail.pals }}\" as=\"p\" hint-placeholder-count=\"0\">\n                  <div style=\"display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #16294a;\">\n                    <div style=\"width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:{{ p.avBg }};color:{{ p.avColor }};\">{{ p.initials }}<\u002Fdiv>\n                    <div style=\"flex:1;\"><div style=\"font-size:13px;font-weight:600;color:#f0f6ff;\">{{ p.nome }}<\u002Fdiv><div style=\"font-size:11px;color:#9fc0db;\">{{ p.aval }} avaliações<\u002Fdiv><\u002Fdiv>\n                    <div style=\"text-align:right;\"><div style=\"font-size:14px;font-weight:800;color:{{ p.color }};font-variant-numeric:tabular-nums;\">{{ p.nps }}<\u002Fdiv><div style=\"font-size:10px;color:#9fc0db;\">NPS<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ detail.hasCom }}\" hint-placeholder-val=\"{{ false }}\">\n                <a href=\"{{ detail.comLink }}\" target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:10px 16px;background:#0f3a2e;color:#00e5c0;border:1px solid #0d4c38;border-radius:9px;font-size:13px;font-weight:600;text-decoration:none;\">\n                  <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg>\n                  Ver {{ detail.comCount }} comentários deste curso\n                <\u002Fa>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noDetail }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;height:340px;gap:10px;color:#3f5f80;text-align:center;padding:20px;\">\n              <svg width=\"44\" height=\"44\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M15 15l5 5M9.5 17A7.5 7.5 0 1 1 9.5 2a7.5 7.5 0 0 1 0 15z\"><\u002Fpath><\u002Fsvg>\n              <p style=\"font-size:13px;margin:0;\">Selecione um curso na lista<br>para ver palestrantes e comentários<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fsc-if>\n\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;metaNps&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:80,&quot;min&quot;:50,&quot;max&quot;:95,&quot;tsType&quot;:&quot;number&quot;},&quot;amostraMinima&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:20,&quot;min&quot;:5,&quot;max&quot;:50,&quot;tsType&quot;:&quot;number&quot;}}\">\nclass Component extends DCLogic {\n  state = { view:'painel', area:'', mod:'', mes:'', search:'', sortKey:'data', sortDir:'desc', selectedId:null, data:null };\n  AV = [{bg:'#0f3a2e',color:'#00e5c0'},{bg:'#1a1a4a',color:'#a7a7ff'},{bg:'#3a1a2e',color:'#ff80b0'},{bg:'#2a1f0a',color:'#ffc060'},{bg:'#0a2a3a',color:'#60c0ff'},{bg:'#1a2a0a',color:'#80d040'}];\n\n  componentDidMount(){ const t=()=>{ if(window.__DASH__) this.setState({data:window.__DASH__}); else setTimeout(t,60); }; t(); }\n\n  get pMeta(){ return this.props.metaNps ?? 80; }\n  get pAmostra(){ return this.props.amostraMinima ?? 20; }\n\n  serialToDate(s){ return new Date((s-25569)*86400*1000); }\n  getMesAno(d){ if(d==null) return null; if(typeof d==='number'){ const dt=this.serialToDate(d); return dt.getUTCFullYear()+'-'+String(dt.getUTCMonth()+1).padStart(2,'0'); } const s=String(d); if(s.includes('-')){ const p=s.split('-'); return p[0]+'-'+p[1]; } if(s.includes('/')){ const p=s.split('/'); return p[2]+'-'+p[1]; } return null; }\n  fmtData(d){ if(d==null) return ''; if(typeof d==='number'){ const dt=this.serialToDate(d); return String(dt.getUTCDate()).padStart(2,'0')+'/'+String(dt.getUTCMonth()+1).padStart(2,'0')+'/'+dt.getUTCFullYear(); } return String(d); }\n  mesShort(k){ const M=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez']; const p=k.split('-'); return M[parseInt(p[1])-1]+'/'+p[0].slice(2); }\n  mesFull(k){ const M=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']; const p=k.split('-'); return M[parseInt(p[1])-1]+'/'+p[0]; }\n  npsColor(n){ const m=this.pMeta; return n>=m?'#00e5c0':n>=m-20?'#ffc15e':'#ff6b6b'; }\n  npsLabel(n){ const m=this.pMeta; return n>=m?'Excelente':n>=m-20?'Bom':'Atenção'; }\n  initials(n){ return (n||'').split(' ').filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase(); }\n  fmtPct(v){ return Math.round(v*100)+'%'; }\n  wNps(list){ const a=list.reduce((s,e)=>s+e.aval,0); return a? Math.round(list.reduce((s,e)=>s+e.nps*e.aval,0)/a):0; }\n\n  filtered(){ const D=this.state.data; if(!D) return []; const q=this.state.search.trim().toLowerCase(); return D.eventos.filter(e=>{ if(this.state.area&&e.area!==this.state.area)return false; if(this.state.mod&&e.mod!==this.state.mod)return false; if(this.state.mes&&this.getMesAno(e.data)!==this.state.mes)return false; if(q&&!e.curso.toLowerCase().includes(q))return false; return true; }); }\n\n  setSort(k){ this.setState(s=> s.sortKey===k? {sortDir:s.sortDir==='asc'?'desc':'asc'} : {sortKey:k,sortDir:k==='curso'?'asc':'desc'}); }\n  openCourse(id){ this.setState({view:'acervo',selectedId:id}); }\n  exportCSV(){ const evs=this.filtered(); const head=['ID','Curso','Área','Modalidade','Data','Inscritos','Confirmados','Avaliações','Taxa de resposta','NPS','Nota média']; const rows=[head]; evs.forEach(e=>rows.push([e.id,e.curso,e.area,e.mod,this.fmtData(e.data),e.inscritos,e.confirmados,e.aval,this.fmtPct(e.taxa),e.nps,e.nota.toFixed(2)])); const csv=rows.map(r=>r.map(c=>'\"'+String(c).replace(/\"/g,'\"\"')+'\"').join(';')).join('\\r\\n'); const blob=new Blob(['\\ufeff'+csv],{type:'text/csv;charset=utf-8;'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='pesquisas_qualidade.csv'; a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000); }\n\n  buildTrend(trend){ const h=React.createElement; if(!trend.length) return h('div',{style:{height:'200px',display:'flex',alignItems:'center',justifyContent:'center',color:'#6f93b5',fontSize:'13px'}},'Sem dados no período selecionado'); const W=760,H=240,mL=40,mR=20,mT=18,mB=30; const pw=W-mL-mR,ph=H-mT-mB,n=trend.length; const maxA=Math.max(1,...trend.map(t=>t.aval)); const X=i=> n===1? mL+pw/2 : mL+pw*i/(n-1); const yN=v=> mT+ph*(1-v/100); const yA=v=> mT+ph*(1-v/maxA); const els=[]; [0,25,50,75,100].forEach(g=>{ const y=yN(g); els.push(h('line',{key:'g'+g,x1:mL,x2:mL+pw,y1:y,y2:y,stroke:'#1c3257',strokeWidth:1})); els.push(h('text',{key:'gl'+g,x:mL-7,y:y+3,textAnchor:'end',fontSize:10,fill:'#6f93b5'},String(g))); }); const bw=Math.min(36,pw/n*0.5); trend.forEach((t,i)=>{ const x=X(i),y=yA(t.aval),bh=(mT+ph)-y; els.push(h('rect',{key:'b'+i,x:x-bw/2,y:y,width:bw,height:Math.max(0,bh),rx:3,fill:'rgba(0,229,192,0.13)'})); els.push(h('text',{key:'bv'+i,x:x,y:y-5,textAnchor:'middle',fontSize:10,fill:'#7fa3c2'},String(t.aval))); }); const pts=trend.map((t,i)=>X(i)+','+yN(t.nps)).join(' '); els.push(h('polyline',{key:'ln',points:pts,fill:'none',stroke:'#00e5c0',strokeWidth:2.5,strokeLinejoin:'round',strokeLinecap:'round'})); trend.forEach((t,i)=>{ const x=X(i),y=yN(t.nps); els.push(h('circle',{key:'d'+i,cx:x,cy:y,r:4.5,fill:this.npsColor(t.nps),stroke:'#0e1c3d',strokeWidth:2})); els.push(h('text',{key:'nv'+i,x:x,y:y-11,textAnchor:'middle',fontSize:11,fontWeight:'700',fill:this.npsColor(t.nps)},String(t.nps))); els.push(h('text',{key:'xl'+i,x:x,y:H-9,textAnchor:'middle',fontSize:11,fill:'#9fc0db'},t.label)); }); return h('svg',{viewBox:'0 0 '+W+' '+H,width:'100%',height:'auto',style:{display:'block',maxHeight:'250px'}},els); }\n\n  renderVals(){\n    const D=this.state.data; const loaded=!!D; const evs=this.filtered();\n    const inscritos=evs.reduce((s,e)=>s+e.inscritos,0), confirmados=evs.reduce((s,e)=>s+e.confirmados,0), aval=evs.reduce((s,e)=>s+e.aval,0);\n    const npsW=this.wNps(evs); const taxaMedia=evs.length?Math.round(evs.reduce((s,e)=>s+e.taxa,0)/evs.length*100):0; const notaMedia=aval?evs.reduce((s,e)=>s+e.nota*e.aval,0)/aval:0;\n    const kpis=[ {val:String(evs.length),lbl:'Eventos',color:'#f0f6ff',sub:''},{val:inscritos.toLocaleString('pt-BR'),lbl:'Inscritos',color:'#f0f6ff',sub:''},{val:confirmados.toLocaleString('pt-BR'),lbl:'Confirmados',color:'#f0f6ff',sub:''},{val:aval.toLocaleString('pt-BR'),lbl:'Avaliações',color:'#f0f6ff',sub:''},{val:taxaMedia+'%',lbl:'Taxa de resposta',color:'#f0f6ff',sub:''},{val:String(npsW),lbl:'NPS ponderado',color:this.npsColor(npsW),sub:this.npsLabel(npsW)},{val:notaMedia.toFixed(1),lbl:'Nota média (0–10)',color:'#f0f6ff',sub:''} ];\n    const bm={}; evs.forEach(e=>{ const k=this.getMesAno(e.data); if(!k)return; (bm[k]=bm[k]||[]).push(e); }); const months=Object.keys(bm).sort(); const trend=months.map(k=>{ const l=bm[k]; const a=l.reduce((s,e)=>s+e.aval,0); return {label:this.mesShort(k),nps:this.wNps(l),aval:a}; });\n    const alertsArr=evs.map(e=>{ const flags=[]; if(e.taxa<0.20)flags.push({t:'Baixa resposta',c:'#ffc15e'}); if(e.aval<this.pAmostra)flags.push({t:'Amostra pequena',c:'#9fc0db'}); if(e.nps<this.pMeta-20)flags.push({t:'NPS baixo',c:'#ff6b6b'}); return {e,flags}; }).filter(x=>x.flags.length).sort((a,b)=> b.flags.length-a.flags.length || a.e.nps-b.e.nps).map(x=>({curso:x.e.curso,nps:x.e.nps,npsColor:this.npsColor(x.e.nps),aval:x.e.aval,taxa:this.fmtPct(x.e.taxa),flags:x.flags,onClick:()=>this.openCourse(x.e.id)}));\n    const amap={}; evs.forEach(e=>{(amap[e.area]=amap[e.area]||[]).push(e);}); const areaStats=Object.keys(amap).map(a=>{const l=amap[a];const nps=this.wNps(l);return{area:a,nps,color:this.npsColor(nps),count:l.length,aval:l.reduce((s,e)=>s+e.aval,0),pct:nps};}).sort((x,y)=>y.nps-x.nps);\n    const modStats=['Online','Presencial','Híbrido'].map(m=>{const l=evs.filter(e=>e.mod===m);const nps=this.wNps(l);return{mod:m,nps:l.length?nps:'—',color:l.length?this.npsColor(nps):'#3f5f80',count:l.length,aval:l.reduce((s,e)=>s+e.aval,0),label:l.length?this.npsLabel(nps):'sem dados'};});\n    const topCourses=evs.filter(e=>e.aval>=this.pAmostra).sort((a,b)=>b.nps-a.nps).slice(0,5).map((e,i)=>({rank:i+1,curso:e.curso,nps:e.nps,color:this.npsColor(e.nps),onClick:()=>this.openCourse(e.id)}));\n    const sorters={data:(a,b)=>a.data-b.data,nps:(a,b)=>a.nps-b.nps,taxa:(a,b)=>a.taxa-b.taxa,aval:(a,b)=>a.aval-b.aval,nota:(a,b)=>a.nota-b.nota,curso:(a,b)=>a.curso.localeCompare(b.curso)}; const dir=this.state.sortDir==='asc'?1:-1; const sorted=[...evs].sort((a,b)=>dir*sorters[this.state.sortKey](a,b));\n    const courses=sorted.map(e=>({curso:e.curso,date:this.fmtData(e.data),area:e.area,mod:e.mod,aval:e.aval,taxa:this.fmtPct(e.taxa),nps:e.nps,npsColor:this.npsColor(e.nps),npsLabel:this.npsLabel(e.nps),small:e.aval<this.pAmostra,selBorder:e.id===this.state.selectedId?'#00e5c0':'transparent',selBg:e.id===this.state.selectedId?'#13284d':'transparent',onClick:()=>this.setState({selectedId:e.id})}));\n    const sel=evs.find(e=>e.id===this.state.selectedId); let detail=null;\n    if(sel&&D){ const pals=D.palestrantes.filter(p=>p.id_evento===sel.id); const comCount=D.comentarios[String(sel.id)]||0; detail={curso:sel.curso,meta:this.fmtData(sel.data)+' · '+sel.area+' · '+sel.mod,small:sel.aval<this.pAmostra,kpis:[{val:String(sel.inscritos),lbl:'Inscritos',color:'#f0f6ff'},{val:String(sel.confirmados),lbl:'Confirmados',color:'#f0f6ff'},{val:String(sel.aval),lbl:'Avaliações',color:'#f0f6ff'},{val:String(sel.nps),lbl:'NPS',color:this.npsColor(sel.nps)},{val:this.fmtPct(sel.taxa),lbl:'Taxa resp.',color:'#f0f6ff'},{val:sel.nota.toFixed(1),lbl:'Nota média',color:'#f0f6ff'}],pals:pals.map((p,i)=>({nome:p.nome,initials:this.initials(p.nome),aval:p.aval,nps:p.nps,color:this.npsColor(p.nps),avBg:this.AV[i%this.AV.length].bg,avColor:this.AV[i%this.AV.length].color})),palCount:pals.length,hasPals:pals.length>0,comCount,hasCom:comCount>0,comLink:'https://nathansindus.github.io/pesquisas_qualidade1/comentarios_pesquisas_qualidade.html?id='+sel.id}; }\n    const areas=D?[...new Set(D.eventos.map(e=>e.area))].sort():[]; const meses=D?[...new Set(D.eventos.map(e=>this.getMesAno(e.data)).filter(Boolean))].sort().map(k=>({key:k,label:this.mesFull(k)})):[];\n    const chips=[]; if(this.state.area)chips.push({label:'Área: '+this.state.area,onRemove:()=>this.setState({area:''})}); if(this.state.mod)chips.push({label:this.state.mod,onRemove:()=>this.setState({mod:''})}); if(this.state.mes)chips.push({label:this.mesFull(this.state.mes),onRemove:()=>this.setState({mes:''})}); if(this.state.search.trim())chips.push({label:'Busca: '+this.state.search.trim(),onRemove:()=>this.setState({search:''})});\n    const sortActive='padding:6px 11px;border-radius:8px;border:1px solid #00e5c0;background:#0f3a2e;color:#00e5c0;font-size:12px;font-weight:700;cursor:pointer;'; const sortIdle='padding:6px 11px;border-radius:8px;border:1px solid #25406b;background:#0e1c3d;color:#9fc0db;font-size:12px;font-weight:600;cursor:pointer;';\n    const sortBtns=[['data','Data'],['nps','NPS'],['taxa','Taxa'],['aval','Avaliações'],['nota','Nota'],['curso','Curso']].map(p=>({label:p[1],arrow:this.state.sortKey===p[0]?(this.state.sortDir==='asc'?'↑':'↓'):'',style:this.state.sortKey===p[0]?sortActive:sortIdle,onClick:()=>this.setSort(p[0])}));\n    const tabA='padding:7px 16px;border:none;border-radius:7px;background:#00e5c0;color:#06243a;font-weight:700;font-size:13px;cursor:pointer;'; const tabI='padding:7px 16px;border:none;border-radius:7px;background:transparent;color:#9fc0db;font-weight:600;font-size:13px;cursor:pointer;';\n    return {\n      loaded, notLoaded:!loaded, isPainel:this.state.view==='painel', isAcervo:this.state.view==='acervo',\n      painelTab:this.state.view==='painel'?tabA:tabI, acervoTab:this.state.view==='acervo'?tabA:tabI,\n      goPainel:()=>this.setState({view:'painel'}), goAcervo:()=>this.setState({view:'acervo'}), exportCSV:()=>this.exportCSV(),\n      areas, meses, areaVal:this.state.area, modVal:this.state.mod, mesVal:this.state.mes, searchVal:this.state.search,\n      onArea:e=>this.setState({area:e.target.value}), onMod:e=>this.setState({mod:e.target.value}), onMes:e=>this.setState({mes:e.target.value}), onSearch:e=>this.setState({search:e.target.value}),\n      activeChips:chips, hasActiveFilters:chips.length>0, clearFilters:()=>this.setState({area:'',mod:'',mes:'',search:''}),\n      kpis, trendChart:this.buildTrend(trend),\n      alerts:alertsArr, hasAlerts:alertsArr.length>0, noAlerts:loaded&&alertsArr.length===0, alertCount:alertsArr.length,\n      areaStats, modStats, topCourses, noTop:loaded&&topCourses.length===0,\n      sortBtns, resultCount:evs.length, courses, hasCourses:courses.length>0, emptyState:loaded&&courses.length===0,\n      detail, hasDetail:!!detail, noDetail:!detail\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
