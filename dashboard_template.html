<style>

  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1b3e;color:#fff;min-height:100vh;padding:24px;overflow-x:hidden;}
  h1{font-size:26px;font-weight:700;color:#00e5c0;margin-bottom:4px;}

  select:focus{outline:none;border-color:#00e5c0;}
  select option{background:#0a1428;color:#fff;padding:8px;}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:24px;}
  .kpi{background:#0a1428;border:1px solid #1e3a5f;border-radius:10px;padding:14px 16px;}
  .kpi-val{font-size:28px;font-weight:700;color:#fff;line-height:1;}
  .kpi-lbl{font-size:11px;color:#7eb8d4;margin-top:4px;}
  .main-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .panel{background:#0a1428;border:1px solid #1e3a5f;border-radius:12px;overflow:hidden;}
  .panel-header{background:#0f2040;padding:10px 14px;font-size:12px;font-weight:700;color:#00e5c0;text-transform:uppercase;letter-spacing:0.06em;display:flex;align-items:center;gap:8px;}
  .panel-header svg{flex-shrink:0;}
  .course-list{overflow-y:auto;max-height:420px;}
  .course-item{padding:12px 14px;border-bottom:1px solid #132035;cursor:pointer;transition:background 0.15s;}
  .course-item:hover{background:#0f2040;}
  .course-item.active{background:#0f2a4a;border-left:3px solid #00e5c0;}
  .course-title{font-size:13px;font-weight:600;color:#fff;line-height:1.3;margin-bottom:4px;}
  .course-meta{font-size:11px;color:#7eb8d4;margin-bottom:8px;}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
  .badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600;}
  .badge-area{background:#0f3a2e;color:#00e5c0;border:1px solid #0d4c38;}
  .badge-mod{background:#1a1a4a;color:#a0a0ff;border:1px solid #2a2a6a;}
  .metrics-row{display:flex;gap:12px;align-items:center;}
  .metric-mini{display:flex;flex-direction:column;gap:1px;}
  .metric-mini .val{font-size:15px;font-weight:700;color:#fff;}
  .metric-mini .lbl{font-size:10px;color:#7eb8d4;}
  .nps-wrap{flex:1;}
  .nps-bar{height:5px;background:#132035;border-radius:3px;overflow:hidden;margin-top:4px;}
  .nps-fill{height:100%;border-radius:3px;background:#00e5c0;transition:width 0.4s ease;}
  .nps-label{font-size:10px;color:#7eb8d4;}
  .detail-panel{padding:16px;overflow-y:auto;max-height:420px;}
  .detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:8px;color:#3a5a7a;text-align:center;}
  .detail-empty svg{opacity:0.4;}
  .detail-empty p{font-size:13px;}
  .detail-title{font-size:15px;font-weight:700;color:#00e5c0;margin-bottom:4px;line-height:1.3;}
  .detail-date{font-size:12px;color:#7eb8d4;margin-bottom:12px;}
  .detail-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
  .detail-kpi{background:#0d1b3e;border:1px solid #1e3a5f;border-radius:8px;padding:10px 12px;text-align:center;}
  .detail-kpi .val{font-size:20px;font-weight:700;color:#fff;}
  .detail-kpi .lbl{font-size:10px;color:#7eb8d4;margin-top:2px;}
  .section-title{font-size:11px;font-weight:700;color:#00e5c0;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;margin-top:14px;}
  .speaker-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #132035;}
  .speaker-row:last-child{border-bottom:none;}
  .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
  .speaker-name{font-size:13px;font-weight:600;color:#fff;flex:1;}
  .speaker-nps{font-size:13px;font-weight:700;}
  .speaker-aval{font-size:11px;color:#7eb8d4;}
  .comments-list{margin-top:4px;}
  .comment-item{background:#0d1b3e;border:1px solid #132035;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;color:#c0d8f0;line-height:1.6;}
  .back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#7eb8d4;cursor:pointer;margin-bottom:12px;padding:4px 0;}
  .back-btn:hover{color:#00e5c0;}
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:#0a1428;}
  ::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:3px;}
  .custom-select{position:relative;min-width:180px;}
  .cs-selected{background:#0a1428;border:1px solid #1e3a5f;color:#fff;padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .cs-selected:hover{border-color:#00e5c0;}
  .cs-options{display:none;position:absolute;top:100%;left:0;right:0;background:#0a1428;border:1px solid #1e3a5f;border-radius:6px;z-index:999;margin-top:4px;max-height:200px;overflow-y:auto;}

  .cs-option:hover{background:#0f2040;color:#00e5c0;}
  .cs-option.selected{color:#00e5c0;}

74-COM-1","id_evento":26874,"evento":"Programa Liderança Feminina","comentario":"Palestra realmente enriquecedora, saio diferente e com resultados rápidos devido a excelente oratória e condução da instrução em sala.","participacao":"Presencial"},{"id":"26874-COM-2","id_evento":26874,"evento":"Programa Liderança Feminina","comentario":"Acho que ficou confuso somente os horários do evento. Foi divulgado um horário e na prática foi outro. Na próxima poderiam realizar em dias consecutivos? Sou do Rio de Janeiro e facilita mais. Obrigada","participacao":"Presencial"},{"id":"26874-COM-3","id_evento":26874,"evento":"Programa Liderança Feminina","comentario":"A palestrante soube passar o conteúdo com muita responsabilidade, cuidado e técnicas. Fiquei satisfeita com a oportunidade.","participacao":"Presencial"},{"id":"26874-COM-4","id_evento":26874,"evento":"Programa Liderança Feminina","comentario":"O treinamento foi excelente. A troca foi enriquecedora","participacao":"Presencial"},{"id":"26874-COM-5","id_evento":26874,"evento":"Programa Liderança Feminina","comentario":"Evento excelente com uma estrutura ótima. A palestrante é excelente, domina o assunto e tem vivência prática o que enriquece muito mais o conhecimento teórico aplicado. Excelente.","participacao":"Presencial"},{"id":"26874-COM-6","id_evento":26874,"evento":"Programa Liderança Feminina","comentario":"Virginia é excelente! Além dos conhecimentos técnicos, ela tem didática e amplo repertório, que através dos exemplos trazidos realmente favorecem o aprendizado. \nAdicionalmente, a organização da equipe do SINDUSFARMA foi impecavél. Deu vontade de fazer outros treinamentos na instituição.","participacao":"Presencial"},{"id":"26874-COM-7","id_evento":26874,"evento":"Programa Liderança Feminina","comentario":"O curso de liderança feminina superou minhas expectativas, especialmente pela qualidade da interação entre as participantes. As trocas de experiências e os debates em grupo foram um dos pontos mais valiosos da formação — ouvir diferentes perspectivas e contextos enriqueceu muito a reflexão sobre o meu próprio percurso e sobre os desafios comuns que enfrentamos como mulheres em ambientes corporativos.\nOutro aspecto que destaco é como o conteúdo dialogou com um trabalho de autoconhecimento que já venho desenvolvendo há algum tempo. Vários conceitos abordados retomaram temas que eu já havia explorado em processos terapêuticos, o que me permitiu revisitá-los sob uma nova lente — agora aplicada especificamente ao contexto da liderança e do desenvolvimento profissional. Essa conexão entre o pessoal e o profissional foi extremamente potente.\nSaio do curso também com uma lista de novos conceitos e ferramentas em que pretendo me aprofundar, tanto pela leitura de materiais complementares quanto pela aplicação prática no dia a dia. Recomendo a formação para outras mulheres em momentos de transição ou consolidação de carreira, e agradeço pela condução cuidadosa e pela construção de um espaço seguro para reflexão e troca.","participacao":"Presencial"},{"id":"26874-COM-8","id_evento":26874,"evento":"Programa Liderança Feminina","comentario":"O treinamento foi realmente transformador. A Virgina é maravilhosa!","participacao":"Presencial"},{"id":"26874-COM-9","id_evento":26874,"evento":"Programa Liderança Feminina","comentario":"Curso extraordinário. Relevante e contemporâneo.","participacao":"Presencial"},{"id":"26877-COM-1","id_evento":26877,"evento":"Assédio Moral na Atualidade: “Mas eu estava só brincando?!”","comentario":"Excelente evento.","participacao":"Online"},{"id":"26877-COM-2","id_evento":26877,"evento":"Assédio Moral na Atualidade: “Mas eu estava só brincando?!”","comentario":"Horário do curso diferente da agenda de inscrição. Falhas de transmissão que duraram quase que o curso inteiro que dificultaram o entendimento do que estava sendo exposto e sem uma finalização. Foi proposta nova agenda quando já havia ultrapassado o horário de encerramento. Não costumo me queixar ssistencial em Rede: Desafios e Perspectivas para o Brasil","comentario":"Sem comentários","participacao":"Online"},{"id":"26273-COM-4","id_evento":26273,"evento":"Cuidado Assistencial em Rede: Desafios e Perspectivas para o Brasil","comentario":"Excelente dia, apresentações muito esclarecedoras.","participacao":"Online"},{"id":"26273-COM-5","id_evento":26273,"evento":"Cuidado Assistencial em Rede: Desafios e Perspectivas para o Brasil","comentario":"Um evento de extrema necessidade para quem participa e não se conforma com o atraso dos processos que deveriam impulsionar a melhoria da saúde pública e privada em nosso país. O tema “Cuidado Assistencial em Rede: Desafios e Perspectivas para o Brasil” foi conduzido por excelentes palestrantes e reforçou algo que já sabemos, mas ainda não vivemos plenamente: precisamos de um cuidado verdadeiramente humanizado, pensado de forma holística e centrado no paciente.\n\nAinda não contamos com um sistema de atenção à saúde com prontuários integrados, o que fragmenta o cuidado e impede que o paciente seja, de fato, o centro da atenção. Para marcar uma simples consulta, o cidadão enfrenta inúmeros protocolos que, muitas vezes, não servem nem para fins estatísticos e tampouco aproximam o paciente dos serviços necessários para completar seus tratamentos.\n\nVivemos em um país que já dispõe de equipamentos modernos, exames de alta precisão e medicamentos eficazes — inclusive para doenças crônicas e de alta complexidade. Produzimos vacinas, temos iniciativas como a farmácia popular, e mesmo assim a jornada do paciente continua repleta de obstáculos. A centralização dos cuidados e as dificuldades de deslocamento (a logística, especialmente para quem vive longe dos grandes centros) tornam o acesso desigual e cansativo. A hospitalização em domicílio, que poderia ser uma alternativa mais humana e eficiente em muitos casos, ainda engatinha.\n\nE por que, mesmo com tantos recursos, ainda não conseguimos garantir que as pessoas façam prevenção e concluam seus tratamentos? A atenção primária, que deveria ser a porta de entrada e o eixo estruturante do sistema, ainda falha em alcançar crianças, idosos e populações vulneráveis com a agilidade e a proximidade necessárias para resolver problemas simples antes que se tornem graves.\n\nHá muito mais a ser dito, mas encerro com a metáfora brilhante usada pela Dra. Kelly Rodrigues:\n“O paciente entra em um lago para atravessá-lo a nado. O médico sabe onde é mais raso e mais fundo; o paciente não.”\n\nE é justamente por isso que precisamos de uma rede de cuidado que guie, acolha e acompanhe — de forma humana, integrada e contínua — cada pessoa que entra nesse lago.","participacao":"Online"},{"id":"27301-COM-1","id_evento":27301,"evento":"Change Management - Gestão de Mudanças","comentario":"Conteúdo bom pelo tempo determinado.","participacao":"Online"},{"id":"26886-COM-1","id_evento":26886,"evento":"Judicialização e precedentes estratégicos no setor farma (B2B)","comentario":"Muito bom!","participacao":"Online"},{"id":"26886-COM-2","id_evento":26886,"evento":"Judicialização e precedentes estratégicos no setor farma (B2B)","comentario":"Excelente palestra! 👏\nMuito clara, objetiva e com conteúdo de grande valor.","participacao":"Online"},{"id":"26886-COM-3","id_evento":26886,"evento":"Judicialização e precedentes estratégicos no setor farma (B2B)","comentario":"Excelente ! a palestrante possui um domínio amplo na área. Foi muito segura e precisa nas observações.","participacao":"Online"},{"id":"26886-COM-4","id_evento":26886,"evento":"Judicialização e precedentes estratégicos no setor farma (B2B)","comentario":"Ótimo centeúdo.","participacao":"Online"},{"id":"26886-COM-5","id_evento":26886,"evento":"Judicialização e precedentes estratégicos no setor farma (B2B)","comentario":"Tema super atual e complexo com impactos diretos nas empresas.","participacao":"Online"},{"id":"26886-COM-6","id_evento":26886,"evento":"Judicialização e precedentes estratégicos no setor f ria mais holistica e global seria muito positivo. Entendo a participação do setor regulado é crucial para discussão, mas poderia trazer cases de sucesso e dores reais da rotina. Mesa redonda mais preparada com perguntas direcionadas para as areas dos participantes da mesa para melhor aproveitamento do conhecimento dos convidados. O evento é importante para o atual cenário mas deve ser mais comprometido com o ensino-aprendizagem como foi a excelente postura e apresentação do Naiffer.","participacao":"Presencial"},{"id":"27112-COM-1","id_evento":27112,"evento":"Estratégias para Monetizar o Crédito Acumulado de ICMS","comentario":"Enriquecedor","participacao":"Online"},{"id":"27112-COM-2","id_evento":27112,"evento":"Estratégias para Monetizar o Crédito Acumulado de ICMS","comentario":"Conteúdo rico","participacao":"Online"},{"id":"27112-COM-3","id_evento":27112,"evento":"Estratégias para Monetizar o Crédito Acumulado de ICMS","comentario":"Evento muito bem preparado. Profissionais de altíssimo gabarito.","participacao":"Online"},{"id":"27200-COM-1","id_evento":27200,"evento":"Desafios e impactos do uso de inteligência artificial nas operações industriais farmacêuticas","comentario":"O tema é extremamente importante, deveriam haver novos treinamentos sobre o tema com uma carga horaria maior.","participacao":"Presencial"},{"id":"27200-COM-2","id_evento":27200,"evento":"Desafios e impactos do uso de inteligência artificial nas operações industriais farmacêuticas","comentario":"O evento foi excelente e gostaria de participar em mais eventos como este.","participacao":"Presencial"},{"id":"27200-COM-3","id_evento":27200,"evento":"Desafios e impactos do uso de inteligência artificial nas operações industriais farmacêuticas","comentario":"Excelente!","participacao":"Presencial"},{"id":"27200-COM-4","id_evento":27200,"evento":"Desafios e impactos do uso de inteligência artificial nas operações industriais farmacêuticas","comentario":"Tópicos tratados de extrema importância e be erientes como para quem esta iniciando essa atividade","participacao":"Presencial"},{"id":"26900-COM-3","id_evento":26900,"evento":"Formação de Auditores: Do Conceito à Execução","comentario":"Foi ótimo o curso. Achei bem completo, bem estruturado e com um modelo que transita entre teoria e prática. Gostaria de sugerir outros temas como: \n- Auditoria em Farmacovigilância e Parceiros comerciais\n- Gestão de Risco e Elaboração de CAPA.","participacao":"Presencial"},{"id":"26900-COM-4","id_evento":26900,"evento":"Formação de Auditores: Do Conceito à Execução","comentario":"O treinamento foi perfeito e muito bem conduzido!","participacao":"Presencial"},{"id":"26900-COM-5","id_evento":26900,"evento":"Formação de Auditores: Do Conceito à Execução","comentario":"O escopo do curso não deixava claro que era tão focado em BPF, sugiro trazer essa informação em próximos, pois o 3º dia foi muito especifico. O primeiro e segundo dia foram ótimos e trouxeram visão mais abrangente, possibilitando ampliar o conhecimento à outras áreas. \n\nO palestrante foi excelente! \n\nSugiro ainda um curso específico para formação de auditores em FMV, pois além de recebimento da ANVISA pelas empresas, recebemos e auditamos parceiros.","participacao":"Presencial"},{"id":"26900-COM-6","id_evento":26900,"evento":"Formação de Auditores: Do Conceito à Execução","comentario":"Curso excelente, muito completo","participacao":"Presencial"},{"id":"26900-COM-7","id_evento":26900,"evento":"Formação de Auditores: Do Conceito à Execução","comentario":"O Danilo detém domínio sobre o assunto. Como minha atuação não é fabril, senti falta de alguns tópicos relacionados a temas não necessariamente fabris, foi ótimo ver exemplos de como a \"fábrica\" funciona, mas nas atividades algumas eram apenas temas de fábrica, acredito que poderia abordar alguns \"descumprimentos\" de outras RDCs que seriam mais no \"âmbito\" administrativo.  Sugiro ter alguma parte do curso demonstrando exemplo de construção de análise de risco e como avaliá-la, ou ter algum curso a parte sobre como elaborador análise de risco (contexto processual fábrica e alguma outra RDC \"administrativa\", cito por exemplo; RDC 735/22), como avaliar a análise de risco. Citaria principais documentos solicitados em auditoria, de forma geral. Sugiro também aprofundar mais a análise e tomada de decisão conforme o POP da ANVISA que trata sobre NC. No geral, gostei bastante do curso, o Danilo é ótimo, calmo e claro.","participacao":"Presencial"},{"id":"26900-COM-8","id_evento":26900,"evento":"Formação de Auditores: Do Conceito à Execução","comentario":"Quanto ao palestrante Danilo Cóstola, só tenho agradecimento por todo o conhecimento transmitido com clareza, calma e muito domínio do tema apresentado.\nQuanto ao evento como um todo, foi muito bem organizado e com um local adequado, porém eu poderia pontuar melhorias para que a nota fosse máxima:\nTítulo: Formação de Auditores: Do Conceito à Execução: acredito que quem busca por esse título, possa esperar um curso com conceitos para formação de auditores em geral, como da ISO 19011 ou até mesmo de outras Normas/Legislações. Apesar de sabermos do foco para a indústria farmacêutica, poderia deixar mais claro que seria \"Auditoria em BPF\", pois existe uma gama de outras Normas afins, mesmo na indústria farmacêutica;\nHorário: Três dias de evento foram adequados para o curso, porém o horário de saída às 18h ficou bem cansativo, para a quantidade de conteúdo do dia e pelo trânsito de São Paulo, principalmente para quem veio de fora, para se alimentar e voltar para o hotel depois mais tarde.\nMaterial de apoio: O curso tem um custo razoável e senti falta de material de apoio distribuído antes do curso. Um drive com as Normas, material teórico e apresentações facilitaria o entendimento e acompanhamento do conteúdo extenso. Ao final do dia seria possível avaliar o que foi ministrado e voltar com dúvidas para o dia seguinte. Sem material, isso ficou prejudicado. Poderia ser avisado da necessidade de levar laptop/ipad ou semelhante, pois na falta de um material disponível, quem tinha um computador teve um diferencial importante para os exercícios.\nObrigada e até a próxima!","participacao":"Presencial"},{"id":"26900-COM-9","id_evento":26900,"evento":"Formação de Auditores: Do Conceito à Execução","comentario":"Conteúdo completo, mas poderia aprofundar mais em alguns temas tecnicos de maior relevancia no cenario regulatorio atual como Integridade de Dados e Controle de Contaminação.\nCom relação ao tempo, o horario de finalização poderia ser mais cedo para evitar transito intenso em SP.","participacao":"Presencial"},{"id":"26900-COM-10","id_evento":26900,"evento":"Formação de Auditores: Do Conceito à Execução","comentario":"O treinamento foi bastante completo a altamente aplicável às atividades de BPF na indústria. Sugiro que entre para o Programa um curso focado em Formação de Auditores em Farmacovigilância e também em Auditorias de Sistemas de Farmacovigilância (RDC 406/2020 e guias internacionais).","participacao":"Presencial"},{"id":"26900-COM-11","id_evento":26900,"evento":"Formação de Auditores: Do Conceito à Execução","comentario":"O instrutor demonstrou domínio técnico e didática para transmitir o conhecimento de maneira clara. Apesar da diversidade de experiência do público participante, foram apresentadas informações relevantes e tivemos discussões enriquecedoras.","participacao":"Presencial"},{"id":"26900-COM-12","id_evento":26900,"evento":"Formação de Auditores: Do Conceito à Execução","comentario":"Sugiro que treinamentos com a carga horária extensa sejam divididos em mais dias.\nSugiro também a realização de curso focado em auditorias de farmacovigilância.","participacao":"Presencial"},{"id":"26900-COM-13","id_evento":26900,"evento":"Formação de Auditores: Do Conceito à Execução","comentario":"O treinamento/curso é excelente e o Danilo passou o assunto com muita clareza, conseguiu sanar muitas dúvidas e ainda nos direcionou para realizar uma auditoria direta e objetiva. O tempo para o curso é excelente e na medida certa, foram abordados muitos assuntos importantes e as dinâmicas são um complemento importante para a prática. Parabéns pelo evento! Como sugestão ao curso: trazer algo relacionado ao setor de Pesquisa e Desenvolvimento, breve, mas é algo interessante para a indústria farmacêutica.","participacao":"Presencial"},{"id":"26900-COM-14","id_evento":26900,"evento":"Formação de Auditores: Do Conceito à Execução","comentario":"Curso muito bom, ensinou teoria e prática.","participacao":"Presencial"},{"id":"26900-COM-15","id_evento":26900,"evento":"Formação de Auditores: Do Conceito à Execução","comentario":"Em relação à organização do evento, acredito que s disponibilização do material previamente ao curso seria de grande valia de modo a possibilitar tomada de notas do conteúdo verbalizado. \nTambém senti falta de um material simples para a tomada das notas (bloco / caneta).\n\nEm relação ao horário, uma dica seria aumentar (se necessário) o tempo em 30 minutos nos dias anteriores para viabilizar a saída mais cedo no último dia de curso, visto que muitos participantes não são da cidade.\n\nEm relação ao palestrante apresentou domínio sobre o tema, contribuindo muito com os exemplos citados ao longo do treinamento. Apenas acrescentaria mais tempo de atividades práticas.","participacao":"Presencial"},{"id":"26900-COM-16","id_evento":26900,"evento":"Formação de Auditores: Do Conceito à Execução","comentario":"Seria interessante abordar sobre o que avaliar em utilidades (HVAC, sistema de água, gases, etc)","participacao":"Presencial"},{"id":"26900-COM-17","id_evento":26900,"evento":"Formação de Auditores: Do Conceito à Execução","comentario":"Eu gostei bastante do curso! \nRealmente é bem completo e o Danilo é muito prestativo e experiente na área. Compartilhou casos, deu dicas, foi muito bom! \nÚnico ponto como sugestão seria a melhor descrição dos exercícios, às vezes os grupos tinham algumas dúvidas em relação ao que estava sendo solicitado, mas claro que o Danilo deu suporte quando foi questionado.","participacao":"Presencial"},{"id":"26900-COM-18","id_evento":26900,"evento":"Formação de Auditores: Do Conceito à Execução","comentario":"Um excelente evento, creio que uma versão online poderia favorecer o acesso de mais profissionais.","participacao":"Presencial"},{"id":"26900-COM-19","id_evento":26900,"evento":"Formação de Auditores: Do Conceito à Execução","comentario":"O treinamento proporcionou uma troca muito interessante de experiências.\nGostaria que os próximos treinamentos adentrassem um pouco mais em temas específicos, ou fossem elaborados treinamentos com temas específicos (HVAC, Classificação de área (utilidades) e afins), creio que com mais tempo, esses temas específicos poderiam ser abordados com maior profundidade.","participacao":"Presencial"},{"id":"26900-COM-20","id_evento":26900,"evento":"Formação de Auditores: Do Conceito à Execução","comentario":"O curso proposto foi excelente assim com o palestrante. Gostaria apenas de propor como melhoria indicar no campo 'Sobre o curso' especificidades de abordagem e/ou base legal de enfoque, já que o curso foi pautado especificamente à luz da RDC 658 da ANVISA que estabelece diretrizes para as Boas Práticas de Fabricação (BPF) e essa informação não ficou clara. Acreditava ser um curso mais genérico ou que abordasse exemplos de outras legislações. Foi muito proveitoso de um modo geral.","participacao":"Presencial"},{"id":"26900-COM-21","id_evento":26900,"evento":"Formação de Auditores: Do Conceito à Execução","comentario":"Vantagens: Palestrante Danilo muito didático, excelente profissional. Lanches de qualidade e com variedades, ar condicionado em temperatura ideal e sala com cadeiras confortáveis.\nDesvantagens: Senti falta de brindes no primeiro dia, considerando o valor do curso (pelo menos caneta e bloquinho), falta do material de apoio e das normas desde o primeiro dia para revisão do namento foi claro, objetivo e muito bem conduzido. O conteúdo foi apresentado de forma didática e prática, facilitando o entendimento das exigências regulatórias e sua aplicação no dia a dia. Excelente iniciativa para atualização e desenvolvimento profissional.","participacao":"Online"},{"id":"27698-COM-13","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"Identifiquei alguns pontos de melhoria na apresentação. Em primeiro lugar, houve informações que não estavam corretas — como a suposta obrigatoriedade da logo do SUS em embalagens governamentais que não são do Ministério da Saúde, a exigência de espaçamento na concentração (quando aplicável apenas a casos em que a unidade está em UI), e a necessidade de inclusão de informações obrigatórias que não são, entre outros exemplos —, o que pode comprometer a confiabilidade do conteúdo apresentado.\n\nAlém disso, a abordagem utilizada foi bastante básica para o perfil dos profissionais presentes, demonstrando um desalinhamento com o nível técnico da audiência.\nO uso da expressão “a legislação é chata” foi inadequado para o contexto, especialmente considerando a presença de representante da ANVISA no evento — o termo mais apropriado seria “complexa”.\n\nTambém foi mencionado que a ANVISA é “muito legal” ou “boazinha” no que tange aos modelos de rotulagem, o que simplifica excessivamente o tema. A construção da legislação e dos modelos de rotulagem é resultado de um trabalho técnico conjunto entre a ANVISA e as empresas, e esse aspecto é importante ser reconhecido.","participacao":"Online"},{"id":"27698-COM-14","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"O evento foi extremamente relevante e agregador, trazendo uma abordagem prática e esclarecedora sobre o marco regulatório de rotulagem de medicamentos. \nParabéns ao Sindusfarma pela organização e pela qualidade do conteúdo apresentado.","participacao":"Online"},{"id":"27698-COM-15","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"Gostaria de agradecer pelo conteúdo apresentado. Foi de suma importância para esclarecer algumas duvidas gerais.","participacao":"Online"},{"id":"27698-COM-16","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"Haviam alguns erros na apresentação em relação à RDC 768 e normas obsoletas.","participacao":"Online"},{"id":"27698-COM-17","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"faltou mais tempo para o retorno de mais dúvidas, pois é um assunto muito complexo","participacao":"Presencial"},{"id":"27698-COM-18","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"Parabéns pela iniciativa... Muito pertinente o assunto e esclarecedor os tópicos importantes.","participacao":"Online"},{"id":"27698-COM-19","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"A palestra foi esclarecedora","participacao":"Online"},{"id":"27698-COM-20","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"O evento foi muito proveitoso, e os pontos abordados pela Talita foram bastante relevantes, principalmente para esclarecimento de dúvidas. Agradeço pelas contribuições e pela condução clara e objetiva dos temas apresentados.\nCom relação à palestrante Claudia, entendo que, em alguns momentos, a abordagem utilizada acabou sendo um pouco inadequada, especialmente pelas recorrentes colocações de que o setor regulado seria “preguiçoso” ou “infantil”, além das observações reiteradas de que os participantes deveriam apenas ler a legislação. Considero que esse tipo de posicionamento não está alinhado com a proposta de um evento voltado justamente ao esclarecimento técnico e à troca construtiva de informações.\nDe toda forma, agradeço pela realização do evento e, mais uma vez, destaco a excelente condução da Talita, sempre muito esclarecedora e receptiva às dúvidas apresentadas.","participacao":"Online"},{"id":"27698-COM-21","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"Assunto importante tanto para a área regulatória como também para quem faz atendimento ao consumidor/paciente.","participacao":"Online"},{"id":"27698-COM-22","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"Muito bom o evento, destaque em especial para palestrante Claudia Cilento. Uma didática muito fluida, e de fácil entendimento, além do amplo conhecimento do tema abordado.","participacao":"Online"},{"id":"27698-COM-23","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"Gostaria de agradecer pela realização do evento e pela oportunidade de discussão dos temas apresentados. Em especial, destaco a participação da Talita, que conduziu os assuntos de maneira muito didática, objetiva e sempre aberta aos questionamentos dos participantes, tornando o encontro bastante produtivo.\n\nPor outro lado, acredito que alguns pontos da abordagem utilizada pela palestrante Claudia poderiam ter sido conduzidos de forma mais adequada. Em determinados momentos, comentários relacionados ao setor regulado, como referências a comportamentos “preguiçosos” ou “infantis”, além da insistência de que bastaria aos participantes consultar a legislação, acabaram transmitindo uma percepção pouco alinhada ao propósito de um evento técnico voltado justamente ao esclarecimento de dúvidas e à construção de um diálogo mais colaborativo.\n\nAinda assim, considero que o evento trouxe conteúdos relevantes e contribuiu positivamente para o entendimento dos temas abordados.","participacao":"Online"},{"id":"27698-COM-24","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"Muito bom!","participacao":"Online"},{"id":"27698-COM-25","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"Conteúdo e apresentações incríveis!","participacao":"Online"},{"id":"27698-COM-26","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"Material muito completo e didática impecável das palestrantes.","participacao":"Online"},{"id":"27698-COM-27","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"O conteúdo foi abordado de forma muito didática, a Claudia é especial! Valeu muito a pena participar!","participacao":"Online"},{"id":"27698-COM-28","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"Excelente!","participacao":"Presencial"},{"id":"27698-COM-29","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"Foi excelente, agregou bastante.","participacao":"Online"},{"id":"27698-COM-30","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"Excelente","participacao":"Online"},{"id":"27698-COM-31","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"Boa tarde, evento bastante esclarecedor e podemos entender que a 768/2022 é um tema muito importante e relevante.","participacao":"Online"},{"id":"27698-COM-32","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"Informações recebidas muito valiosas","participacao":"Online"},{"id":"27698-COM-33","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"Muito rico e didático.","participacao":"Online"},{"id":"27698-COM-34","id_evento":27698,"evento":"Descomplicando o Marco R e Medicamentos","comentario":"Tema muito importante para conhecimento e adequação na rotina! \nSindusfarma sempre apresentando os melhores conteúdos, ministrado por excelentes profissionais!","participacao":"Online"},{"id":"27698-COM-66","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"A segunda parte com a participação da Talita foi excelente, deu uma boa visão sobre os principais motivos de exigência e as questões referentes às destinações. Porém, para aprimeira parte minha expectativa era que a palestrante trouxesse uma discussão dos pontos da norma que sempre geraram mais dúvidas e motivaram as publicações de retificação e perguntas e respostas, como as frases relacionadas aos cálculos de substâncias, agulhas, frases relacionadas aos cuidados de conservação e validade após reconstituição/diluição, modo de usar, como descrever os dados do fabricante e detentor de registro na rotulagem. Neste momento, acredito que a grande maioria já realizou a leitura da norma algumas vezes, por isso uma apresentação focada nos principais pontos de dúvidas poderia ter sido mais efetivo.","participacao":"Online"},{"id":"27698-COM-67","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"tema extremamente necessario","participacao":"Online"},{"id":"27698-COM-68","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"Foi muito bom para verificar se estamos alinhados com as práticas da Anvisa.","participacao":"Presencial"},{"id":"27698-COM-69","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"O curso foi excelente trazendo de forma objetiva os requisitos da norma.","participacao":"Online"},{"id":"27698-COM-70","id_evento":27698,"evento":"Descomplicando o Marco Regulatório de Rotulagem de Medicamentos","comentario":"O curso foi ótimo, assunto super importante e as pale articipacao":"Presencial"},{"id":"27620-COM-13","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"A palestra apresentou excelente qualidade, abordando o tema de forma clara, objetiva e muito bem estruturada. A palestrante demonstrou domínio do conteúdo, transmitindo conhecimento de maneira didática, o que facilitou a compreensão.","participacao":"Online"},{"id":"27620-COM-14","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Muito bacana a troca de conhecimentos.","participacao":"Online"},{"id":"27620-COM-15","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"O treinamento foi incrível, e a Denise é excelente. A única ressalva que tenho a fazer é em relação ao áudio, que estava bastante baixo para quem participou online, o que dificultou, em alguns momentos, a compreensão do que estava sendo falado.","participacao":"Online"},{"id":"27620-COM-16","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Discussão superficial do tema. O REQ limitou-se à leitura dos itens, sem aprofundar a análise sob a perspectiva avaliativa da ANVISA.","participacao":"Online"},{"id":"27620-COM-17","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Curso ótimo com muitas informações novas e conteúdos interessantes. Muito bom","participacao":"Online"},{"id":"27620-COM-18","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"A didática da apresentação pode ser aprimorada, especialmente em relação à clareza, organização e fluidez. Em alguns momentos, a condução ficou um pouco confusa, o que dificultou o acompanhamento e reduziu o engajamento.","participacao":"Online"},{"id":"27620-COM-19","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Evento de grande proveito para o meu aprimoramento profissional e ampliação de conhecimentos. Palestrante excepcional, com amplo domínio dos temas abordados e uma didática clara e envolvente","participacao":"Online"},{"id":"27620-COM-20","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Apesar de ter achado o evento excelente como um todo, acredito que o assunto de maior interesse teve pouco destaque, que era a questão do REQ.","participacao":"Online"},{"id":"27620-COM-21","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"ÓTIMO EVENTO, PALESTRANTE COM MUITO CONHECIMENTO.","participacao":"Online"},{"id":"27620-COM-22","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"O conhecimento da Denice é, sem dúvida, um grande diferencial do curso, especialmente considerando sua ampla experiência na indústria farmacêutica. A forma como ela compartilha vivências e informações práticas agrega bastante valor ao conteúdo apresentado.\nNo entanto, acredito que a parte prática do curso poderia ter sido mais aprofundada. Em alguns momentos, dúvidas levantadas pelos participantes acabavam ficando sem respostas mais objetivas, ou retornavam como uma reflexão, o que deixou a sensação de falta de direcionamento em determinados temas.\nMinha expectativa era compreender de forma mais detalhada as solicitações da ANVISA através do REQ, explorando exemplos práticos e interpretações mais aplicáveis ao dia a dia. Porém, o conteúdo acabou sendo apresentado de maneira mais introdutória e geral.\nDe forma geral, o curso possui um conteúdo relevante e uma profissional muito experiente conduzindo as aulas, mas acredito que um maior aprofundamento prático tornaria a experiência ainda mais completa e enriquecedora. Muito obrigada!","participacao":"Online"},{"id":"27620-COM-23","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"O curso foi ótimo. Muitas abordagens e trocas significativas.","participacao":"Online"},{"id":"27620-COM-24","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"O evento foi ótimo, consegui obter muitos ensinamentos.","participacao":"Online"},{"id":"27620-COM-25","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Ao considerar o nome do evento, a agenda disponibilizada e os acontecimentos mais recentes na Anvisa, a expectativa era de que fossem abordados tópicos relacionados ao REQ como instruções de preenchimento, dicas, experiências de outras empresas (considerando que a palestrante possui uma consultoria), e não foi isso que foi apresentado. No primeiro dia, foram abordados temas muito básicos para quem já é da área (e que está envolvido com o preenchimento do REQ) e no segundo dia, não tiveram informações diferentes da que o setor regulado já possuía em relação ao documento.","participacao":"Online"},{"id":"27620-COM-26","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Avaliar o som para quem participa de forma online, visando melhor aproveitamento do treinamento.","participacao":"Online"},{"id":"27620-COM-27","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Foi excelente! A Denise é maravilhosa!","participacao":"Online"},{"id":"27620-COM-28","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Devido ao tema poderia ter sido mais voltado a nova legislação de análise otimizada em sim, destrinchando os principais pontos, quais as expectativas, pontos levantados pela Anvisa e as Empresas. Como elaborar a documentação da melhor forma para a Análise Otimizada.","participacao":"Online"},{"id":"27620-COM-29","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Muito bom!","participacao":"Online"},{"id":"27620-COM-30","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Acho que poderia ter focado mais nas REQs, mesmo sendo um assunto sem expertise por ser novidade para todos, citando cases, abrindo para discussão, porque o tema de MRQ foi um pouco repetitivo para quem já está inserido em processos mais robustos de AR (mesmo para mim, que sou de documentação técnica analítica de PA).","participacao":"Online"},{"id":"27620-COM-31","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"A proposta de relatar e entender a analise otimizada (REQ) foi muito fraca, não havendo aprofundamento nos itens e detalhamento do que se espera, além de não enfatizar pontos críticos. Infelizmente, algum impasse ocorreu com a palestrante fazendo com que encurtasse a apresentação, ademais no tema mais importante.","participacao":"Online"},{"id":"27620-COM-32","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Evento sensacional e ótima explicação da palestrante Denise","participacao":"Online"},{"id":"27620-COM-33","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Achei que o conteúdo planejado era muito interessante mas senti falta de exemplos práticos e mais atuais sobre as regulamentações cenário regulatório brasileiro.","participacao":"Online"},{"id":"27620-COM-34","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Tínhamos grande expectativa em relação ao evento, especialmente por se tratar da nova era do REQ.\nO evento foi dividido em dois dias. Entretanto, no primeiro dia (27/05), foi apresentada apenas uma visão básica sobre assuntos regulatórios voltados à análise do dossiê do produto, deixando o tema REQ para ser discutido em apenas meio período do segundo dia (28/05). \nA palestrante Denise, que possui reconhecimento na área regulatória farmacêutica, demonstrou pouco domínio sobre o assunto REQ, não trazendo orientações práticas, dicas relevantes ou contribuições adicionais baseadas em sua experiência na ANVISA para auxiliar no entendimento do documento.\nAlém disso, sua postura durante o evento foi pouco profissional para uma palestrante. Houve imposição para que não fosse realizado intervalo no período da tarde do dia 27/05, proibição da gravação da palestra, além de declarações se eximindo de responsabilidade sobre o conteúdo apresentado. Também houve ausência da palestrante durante parte do período da tarde de hoje, justamente no momento em que o tema REQ seria abordado.\nDiante disso, causa estranheza que a palestrante seja apresentada como referência em assuntos regulatórios relacionados à ANVISA, especialmente considerando sua experiência prévia no órgão, mas sem transmitir conhecimentos práticos ou diferenciais esperados para esse tipo de evento. \nDe forma geral, o evento não atendeu às expectativas propostas. Não foram apresentados conteúdos novos ou aprofundados, não houve auxílio efetivo para o preenchimento do REQ e tampouco foi compartilhada a visão prática da ANVISA que havia sido sugerida na divulgação do curso.","participacao":"Online"},{"id":"27620-COM-35","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Foi excelente!","participacao":"Online"},{"id":"27620-COM-36","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"A palestrante tratou o tema com casos reais, facilitando assim a compreensão do tema, além de condução da palestra de uma forma tranquila, mas de modo que não fosse cansativa. O compartilhamento dos pontos relacionados ao REQ foram os que mais contribuíram para o momento da companhia em qual atual, corroborando com o mesmo cenário e dificuldades discutidas.","participacao":"Presencial"},{"id":"27620-COM-37","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Positivo pelo compartilhamento e visão dos colaboradores de empresas diferentes. Entendo que o REQ é um tema muito recente para todos, mas senti falta de mais conteúdo referente à própria temática.","participacao":"Online"},{"id":"27620-COM-38","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Evento rico com muita oportunidade de avaliação / re-avaliação de processos e referências. Ecoou muito positivamente.","participacao":"Online"},{"id":"27620-COM-39","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Achei o tema muito interessante e atual, algo que vamos precisar aplicar na nossa rotina. A abordagem inicial foi boa e trouxe uma visão geral interessante do assunto. Porém, quando chegou no foco da REQ, senti que o tema foi tratado de forma muito rápida e superficial. Nesse ponto, a discussão acabou sendo mais complementada por quem já tem experiência na rotina do que pela própria palestrante. Acredito que a palestrante tenha bastante experiência no tema, mas a condução do curso, em alguns momentos, foi um pouco confusa e desorganizada. Houve várias falas fora do foco, o que acabou gerando dispersão e possível perda de interesse. Para alguns, sendo um curso pago, ainda mais considerando que não é barato, a experiência provavelmente foi mais frustrante.","participacao":"Online"},{"id":"27620-COM-40","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"A abordagem do conteúdo permaneceu na superfície e não entregou as perspectivas que buscava.","participacao":"Online"},{"id":"27620-COM-41","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"A palestra abordou um tema extremamente relevante, especialmente diante das mudanças recentes envolvendo o REQ e a automatização dos processos na Anvisa. No entanto, a condução do conteúdo poderia ter sido mais estruturada e aprofundada, principalmente na parte central da proposta.\n\nNa seção destinada ao REQ, esperava-se uma explicação mais clara sobre conceitos, aplicabilidade prática e direcionamentos técnicos. Contudo, o enfoque acabou sendo mais voltado às dificuldades e à complexidade do processo, sem o mesmo nível de detalhamento sobre como superá-las no contexto regulatório.\n\nAlém disso, a apresentação dedicou uma parcela do tempo à demonstração de uma ferramenta de otimização, o que acabou transmitindo a percepção de um viés comercial, desviando do objetivo principal da palestra.","participacao":"Online"},{"id":"27620-COM-42","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Achei que a palestrante poderia trazer contribuições mais significativas, apresentando pontos críticos de fato do dossiê, exigências mais recebidas atualmente, etc. No primeiro dia achei bem superficial a apresentação e no segundo dia, onde poderiam haver mais contribuições sobre o REQ e demais itens da agenda, o curso foi finalizado em meio período apenas.","participacao":"Presencial"},{"id":"27620-COM-43","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Foi espetacular participar, foi realmente uma troca de conhecimento e experiência muito boa.","participacao":"Online"},{"id":"27620-COM-44","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"sem comentários adicionais","participacao":"Online"},{"id":"27620-COM-45","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Evento esclarecedor, uma vez que abordou os itens de registro e do REQ.","participacao":"Online"},{"id":"27620-COM-46","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"O evento foi muito interessante no aspecto da revisão da documentação de CMC, mas senti falta de exemplos mais voltados para o preenchimento do REQ em si.","participacao":"Online"},{"id":"27620-COM-47","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Foi interessante os temas abordados, porém minha expectativa era ser focado REQ e da análise automatizada/otimizada.\n\nObrigada.","participacao":"Online"},{"id":"27620-COM-48","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"O primeiro dia do curso foi muito bom, mas deixou muito a desejar no segundo dia, tanto pelo tempo como pelo conteúdo que passou extremamente rápido. Como no meu caso foi um curso pago, realmente, não valeu a pena o valor.","participacao":"Online"},{"id":"27620-COM-49","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Uso de normas desatualizadas, linha de raciocínio confusa, informações conflitantes com a legislação.","participacao":"Online"},{"id":"27620-COM-50","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Excelente conteúdo, facilitador com excelente didática","participacao":"Online"},{"id":"27620-COM-51","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"é mto importante trazer pessoas que estão na interface direta entre expectativa da agencia e realidades das industrias.","participacao":"Presencial"},{"id":"27620-COM-52","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Excelente conteúdo!","participacao":"Online"},{"id":"27620-COM-53","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Excelente apresentação, muito esclarecedora.","participacao":"Online"},{"id":"27620-COM-54","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"ótimo assunto, acrescentou bastante mas ainda há muitas incertezas na atuação da Anvisa, muita dificuldade repassando para as prejuizo do trabalho atrasado, enfim...ainda restam duvidas..","participacao":"Online"},{"id":"27620-COM-55","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"O evento foi ótimo, e conseguiu, em pouco tempo trazer os principais pontos de atenção para a elaboração e montagem de dossiês de registro mais robustos. O material apresentado também será muito útil para consultas futuras. Também foi ótima a possibilidade de tirar dúvidas e compartilhar da experiência e conhecimento da palestrante e demais colegas","participacao":"Presencial"},{"id":"27620-COM-56","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"O título do curso era: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada. A parte do MRQ foi uma apresentação pouco aprofundada e que seria muito interessante para analistas juniores, que estão ingressando na área regulatória. Para quem já tem mais experiência e atua na área, faltou aprofundamento e o que todos estavam esperando era um olhar para o REQ. As correlações com o que é requerido, um novo olhar sobre o que REQ nos mostra que a Anvisa considera nas avaliações. E isso não aconteceu. Na única parte que entramos no REQ a palestrante só compartilhava suas opiniões pessoais e queria mais ouvir as experiências das outras pessoas. Por ser uma consultoria, passava a impressão que queria coletar informações para utilizar em sua rotina. Me deixou muito decepcionada, pois esperava mais do curso em vista de como o tema REQ está em alta atualmente.","participacao":"Presencial"},{"id":"27620-COM-57","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Considerando o escopo do evento relacionado ao REQ, a discussão relacionado ao documento poderia ser mais extensa e aprofundada.","participacao":"Presencial"},{"id":"27620-COM-58","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"ótimo","participacao":"Online"},{"id":"27620-COM-59","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"O evento foi muito bom! O tema é bastante atual e ainda bem novo para todos e por isso, a troca de experiências foi muito importante. Gostei muito! Obrigada","participacao":"Online"},{"id":"27620-COM-60","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Acho que faltou mais desenvolvimento e debate sobre O MRQ e a REQ. Talvez o tempo foi curto, mas senti falta de conteúdo técnico.","participacao":"Online"},{"id":"27620-COM-61","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"A Denise é excelente, sempre muito didática.","participacao":"Online"},{"id":"27620-COM-62","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"O problema do microfone muito baixo comprometeu o evento e a redução dos temas para o segundo dia.","participacao":"Presencial"},{"id":"27620-COM-63","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Muitas informações","participacao":"Online"},{"id":"27620-COM-64","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Ótimo evento, extremamente esclarecedor","participacao":"Online"},{"id":"27620-COM-65","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Excelente evento, muito rico em detalhes, parabéns!","participacao":"Presencial"},{"id":"27620-COM-66","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"O treinamento foi muito bom, com uma programação interessante e bem estruturada. A instrutora demonstrou excelente didática, conduzindo o conteúdo de forma clara e acessível, o que contribuiu significativamente para o aproveitamento das atividades.\nComo ponto de melhoria, destaco que o segundo e último dia foi conduzido de forma bastante acelerada. A programação prevista para os períodos da manhã e da tarde acabou sendo concentrada apenas na manhã, o que resultou na exclusão de alguns temas relevantes, especialmente aqueles nos quais eu tinha maior interesse em me aprofundar. Compreendo que imprevistos podem ocorrer, porém, na prática, houve a perda de um turno do treinamento, impactando parcialmente a experiência.\nDe forma geral, a experiência foi positiva, principalmente pela qualidade da condução e do conteúdo apresentado.","participacao":"Online"},{"id":"27620-COM-67","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Gostaria de contribuir com um feedback construtivo sobre o curso. Embora a proposta fosse interessante, o conteúdo apresentado não atendeu totalmente às minhas expectativas. Tive a percepção de que o ritmo foi bastante acelerado, especialmente nas partes mais críticas, como EqFar e estabilidade, que foram abordadas de forma muito rápida.\nPor outro lado, a seção de REQ acabou sendo mais longa, porém sem uma estrutura clara de explicação ou aprofundamento. Houve predominantemente uma troca de experiências entre os participantes, o que, embora válido, não agregou de forma significativa ao meu desenvolvimento técnico.\nEu esperava maior direcionamento por parte do instrutor, com apresentação de requisitos aplicáveis, exemplos práticos e, se possível, casos reais que ilustrassem melhor os pontos discutidos.\nAlém disso, algumas das minhas dúvidas não foram plenamente esclarecidas, o que contribuiu para a sensação de aproveitamento limitado do curso.\nAcredito que ajustes no equilíbrio do tempo entre os tópicos e maior foco em conteúdo estruturado e aplicado poderiam enriquecer bastante a experiência.","participacao":"Online"},{"id":"27620-COM-68","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"A Denise é excelente, demonstra ter muita experiência e o principal, está disposta a compartilhar.\nO curso foi bem caro e o segundo dia ficou corrido. Imprevistos acontecem e super entendo ela ter que sair, mas penso que outra pessoa da Brainlike poderia ter assumido a apresentação na parte da tarde no lugar da Denise.","participacao":"Online"},{"id":"27620-COM-69","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Excelente  apresentação.","participacao":"Online"},{"id":"27620-COM-70","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"Apesar da experiência ampla da paletrante , eu esperava que uma maior exploração sobre o assunto REQ.","participacao":"Online"},{"id":"27620-COM-71","id_evento":27620,"evento":"Avaliação da Qualidade na Anvisa: entendendo o MRQ e a nova era do REQ e da análise automatizada/otimizada","comentario":"O conteúdo foi bom, tinha muito embasamento e conhecimento da apresentadora, porém ela p const EVENTOS = _DATA_.eventos;

  {bg:"#0f3a2e",color:"#00e5c0"},{bg:"#1a1a4a",color:"#a0a0ff"},{bg:"#3a1a2e",color:"#ff80b0"},
  {bg:"#2a1f0a",color:"#ffc060"},{bg:"#0a2a3a",color:"#60c0ff"},{bg:"#1a2a0a",color:"#80d040"}
];

function getInitials(nome){return nome.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();}
function getNPSColor(nps){if(nps>=80)return"#00e5c0";if(nps>=60)return"#ffc060";return"#ff6060";}
function fmtPct(v){return Math.round(v*100)+'%';}

let selectedId = null;
let filteredEventos = [...EVENTOS];
let currentArea = '';
let currentMod = '';
let currentMes = '';

const MESES_NOMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function excelSerialToDate(serial) {
  // Converte número serial do Excel (ex: 46042) para objeto Date
  var date = new Date((serial - 25569) * 86400 * 1000);
  return date;
}

function getMesAno(dataStr) {
  if (!dataStr) return null;
  var ano, mes;
  // Número serial do Excel
  if (typeof dataStr === 'number') {
    var d = excelSerialToDate(dataStr);
    ano = d.getUTCFullYear();
    mes = String(d.getUTCMonth() + 1).padStart(2, '0');
    return ano + '-' + mes;
  }
  var parts;
  if (String(dataStr).includes('-')) {
    parts = String(dataStr).split('-');
    return parts[0] + '-' + parts[1];
  } else if (String(dataStr).includes('/')) {
    parts = String(dataStr).split('/');
    return parts[2] + '-' + parts[1];
  }
  return null;
}

function fmtData(dataStr) {
  // Formata data para exibição dd/mm/aaaa
  if (!dataStr) return '';
  if (typeof dataStr === 'number') {
    var d = excelSerialToDate(dataStr);
    return String(d.getUTCDate()).padStart(2,'0') + '/' +
           String(d.getUTCMonth()+1).padStart(2,'0') + '/' +
           d.getUTCFullYear();
  }
  return dataStr;
}

function formatMesAno(key) {
  // "2026-01" → "Janeiro/2026"
  var parts = key.split('-');
  var mes = parseInt(parts[1]) - 1;
  return MESES_NOMES[mes] + '/' + parts[0];
}

function toggleDD(id){
  const el = document.getElementById(id);
  const isOpen = el.classList.contains('open');
  document.querySelectorAll('.cs-options').forEach(e=>e.classList.remove('open'));
  if(!isOpen) el.classList.add('open');
}

document.addEventListener('click', function(e){
  if(!e.target.closest('.custom-select')) document.querySelectorAll('.cs-options').forEach(e=>e.classList.remove('open'));
});

function pickArea(idx){
  currentArea = idx === -1 ? '' : window._areas[idx];
  const label = idx === -1 ? 'Todos' : window._areas[idx];
  document.querySelector('#areaDropdown .cs-selected').innerHTML = label + ' <span>&#9660;</span>';
  document.querySelectorAll('#areaDD .cs-option').forEach((o,i)=>o.classList.toggle('selected', i-1===idx));
  document.getElementById('areaDD').classList.remove('open');
  applyFilters();
}

function pickMes(idx){
  currentMes = idx === -1 ? '' : window._meses[idx];
  const label = idx === -1 ? 'Todos' : formatMesAno(window._meses[idx]);
  document.querySelector('#mesDropdown .cs-selected').innerHTML = label + ' <span>&#9660;</span>';
  document.querySelectorAll('#mesDD .cs-option').forEach((o,i)=>o.classList.toggle('selected', i-1===idx));
  document.getElementById('mesDD').classList.remove('open');
  applyFilters();
}

function pickMod(val){
  currentMod = val;
  const label = val || 'Todos';
  document.querySelector('#modDropdown .cs-selected').innerHTML = label + ' <span>&#9660;</span>';
  document.querySelectorAll('#modDD .cs-option').forEach(o=>o.classList.toggle('selected', o.getAttribute('onclick').includes("'"+val+"'")));
  document.getElementById('modDD').classList.remove('open');
  applyFilters();
}

function populateFilters(){
  // Áreas — usa índice para evitar problema com aspas nos nomes
  const areas = [...new Set(EVENTOS.map(e=>e.area))].sort();
  window._areas = areas;
  const dd = document.getElementById('areaDD');
  dd.innerHTML = '<div class="cs-option selected" onclick="pickArea(-1)">Todos</div>' +
    areas.map((a, i) => `<div class="cs-option" onclick="pickArea(${i})">${a}</div>`).join('');

  // Mês/Ano — ordenado cronologicamente
  const meses = [...new Set(EVENTOS.map(e => getMesAno(e.data)).filter(Boolean))].sort();
  window._meses = meses;
  const ddMes = document.getElementById('mesDD');
  ddMes.innerHTML = '<div class="cs-option selected" onclick="pickMes(-1)">Todos</div>' +
    meses.map((m, i) => `<div class="cs-option" onclick="pickMes(${i})">${formatMesAno(m)}</div>`).join('');
}

function applyFilters(){
  filteredEventos = EVENTOS.filter(function(e) {
    var passaArea = !currentArea || e.area === currentArea;
    var passaMod = !currentMod || e.mod === currentMod;
    var passaMes = !currentMes || getMesAno(e.data) === currentMes;
    return passaArea && passaMod && passaMes;
  });
  renderKPIs();
  renderCourses();
  if(selectedId && !filteredEventos.find(e=>e.id===selectedId)){
    selectedId=null;
    document.getElementById('detailPanel').innerHTML=`<div class="detail-empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 15l5 5M9.5 17A7.5 7.5 0 1 1 9.5 2a7.5 7.5 0 0 1 0 15z"/></svg><p>Selecione um curso na lista<br>para ver palestrantes e comentários</p></div>`;
  }
}

function renderKPIs(){
  const inscritos = filteredEventos.reduce((s,e)=>s+e.inscritos,0);
  const confirmados = filteredEventos.reduce((s,e)=>s+e.confirmados,0);
  const aval = filteredEventos.reduce((s,e)=>s+e.aval,0);
  const npsMedia = filteredEventos.length ? Math.round(filteredEventos.reduce((s,e)=>s+e.nps,0)/filteredEventos.length) : 0;
  const taxaMedia = filteredEventos.length ? Math.round(filteredEventos.reduce((s,e)=>s+e.taxa,0)/filteredEventos.length*100) : 0;
  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="kpi-val">${inscritos.toLocaleString('pt-BR')}</div><div class="kpi-lbl">Inscritos</div></div>
    <div class="kpi"><div class="kpi-val">${confirmados.toLocaleString('pt-BR')}</div><div class="kpi-lbl">Confirmados</div></div>
    <div class="kpi"><div class="kpi-val">${aval.toLocaleString('pt-BR')}</div><div class="kpi-lbl">Avaliações</div></div>
    <div class="kpi"><div class="kpi-val" style="color:${getNPSColor(npsMedia)}">${npsMedia}</div><div class="kpi-lbl">NPS Médio</div></div>
    <div class="kpi"><div class="kpi-val">${taxaMedia}%</div><div class="kpi-lbl">Taxa Resposta</div></div>
  `;
}

function renderCourses(){
  const list = document.getElementById('courseList');
  if(!filteredEventos.length){list.innerHTML='<div style="padding:20px;color:#3a5a7a;text-align:center;font-size:13px;">Nenhum curso encontrado</div>';return;}
  list.innerHTML = filteredEventos.map(e=>`
    <div class="course-item${e.id===selectedId?' active':''}" onclick="selectCourse(${e.id})">
      <div class="course-title">${e.curso}</div>
      <div class="course-meta">${fmtData(e.data)}</div>
      <div class="badges">
        <span class="badge badge-area">${e.area}</span>
        <span class="badge badge-mod">${e.mod}</span>
      </div>
      <div class="metrics-row">
        <div class="metric-mini"><div class="val">${e.aval}</div><div class="lbl">Aval.</div></div>
        <div class="metric-mini"><div class="val">${fmtPct(e.taxa)}</div><div class="lbl">Resposta</div></div>
        <div class="nps-wrap">
          <div class="nps-label">NPS <strong style="color:${getNPSColor(e.nps)}">${e.nps}</strong></div>
          <div class="nps-bar"><div class="nps-fill" style="width:${e.nps}%;background:${getNPSColor(e.nps)}"></div></div>
        </div>
      </div>
    </div>
  `).join('');
}

function selectCourse(id){
  selectedId = id;
  renderCourses();
  const ev = EVENTOS.find(e=>e.id===id);
  const pals = PALESTRANTES.filter(p=>p.id_evento===id);
  const coms = COMENTARIOS[id] || [];
  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-panel">
      <div class="detail-title">${ev.curso}</div>
      <div class="detail-date">${fmtData(ev.data)} · ${ev.area} · ${ev.mod}</div>
      <div class="detail-kpis">
        <div class="detail-kpi"><div class="val">${ev.inscritos}</div><div class="lbl">Inscritos</div></div>
        <div class="detail-kpi"><div class="val">${ev.confirmados}</div><div class="lbl">Confirmados</div></div>
        <div class="detail-kpi"><div class="val">${ev.aval}</div><div class="lbl">Avaliações</div></div>
        <div class="detail-kpi"><div class="val" style="color:${getNPSColor(ev.nps)}">${ev.nps}</div><div class="lbl">NPS Geral</div></div>
        <div class="detail-kpi"><div class="val">${fmtPct(ev.taxa)}</div><div class="lbl">Tx. Resposta</div></div>
        <div class="detail-kpi"><div class="val">${ev.nota.toFixed(1)}</div><div class="lbl">Nota Média</div></div>
      </div>
      ${pals.length ? `
        <div class="section-title">Palestrantes (${pals.length})</div>
        ${pals.map((p,i)=>`
          <div class="speaker-row">
            <div class="avatar" style="background:${AVATAR_COLORS[i%AVATAR_COLORS.length].bg};color:${AVATAR_COLORS[i%AVATAR_COLORS.length].color}">${getInitials(p.nome)}</div>
            <div style="flex:1">
              <div class="speaker-name">${p.nome}</div>
              <div class="speaker-aval">${p.aval} avaliações</div>
            </div>
            <div style="text-align:right">
              <div class="speaker-nps" style="color:${getNPSColor(p.nps)}">${p.nps}</div>
              <div class="speaker-aval">NPS</div>
            </div>
          </div>
        `).join('')}
      ` : ''}
      ${coms.length ? `
        <div class="section-title">Comentários (${coms.length})</div>
        <div class="comments-list">
          ${coms.map(c=>`<div class="comment-item">"${c}"</div>`).join('')}
        </div>
      ` : ''}
    </div>
  `;
}

populateFilters();
renderKPIs();
renderCourses();
</script>
</body>
</html>
